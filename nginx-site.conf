# =============================================================================
# Nginx Config for Auror Academy (for existing reverse proxy)
# =============================================================================
# Add this to your existing nginx configuration on the server
# Usually at: /etc/nginx/sites-available/autror-academy

server {
    listen 80;
    listen [::]:80;
    server_name autror-academy.beautiful-apps.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auror-academy.beautiful-apps.com;

    # SSL certificates (adjust path if using different cert location)
    ssl_certificate /etc/letsencrypt/live/auror-academy.beautiful-apps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auror-academy.beautiful-apps.com/privkey.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # API requests -> backend
    location /api/ {
        proxy_pass http://127.0.0.1:8085/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8085/health;
    }

    # Everything else -> frontend
    location / {
        proxy_pass http://127.0.0.1:3085/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
