  # ---------------------------------------------------------------------------
  # SOLUTION
  # ---------------------------------------------------------------------------
  solution:
    culprit: "dobby"
    method: "House-elf binding magic applied on top of Hand of Glory discharge. Draco's ritual stunned Snape; Dobby's magic completed the petrification. Two spells layered together."
    motive: "Slavery. Lucius Malfoy ordered Dobby to protect Draco at all costs. When Snape tried to stop Draco's ritual, Dobby followed his master's orders. He didn't intend permanent petrification — the two magics combining was unintended."

    key_evidence:
      - "dual_shimmer" # Two magic types on Snape — proves two attackers
      - "kitchen_log" # Dobby absent during exact attack window
      - "dobby_frostbite" # Physical proof Dobby was at the scene
      - "lucius_order" # Proves Dobby was acting under orders
      - "wand_signature" # Proves Snape was trying to help, not attack
      - "frost_pattern" # Hand of Glory discharge (Draco's contribution)
      - "torn_letter" # Connects Hand of Glory to Draco
      - "hermione_book_slip" # Clears Hermione (she was reading in the alcove)

    deductions_required:
      - "Two magic types on Snape prove two separate magical events, not one"
      - "Draco's confession: Snape was still moving when he fled — something finished the job"
      - "Kitchen log: Dobby was absent during the exact attack window"
      - "Dobby's frostbite: physical proof he was at the scene during both magical events"
      - "Lucius's parchment: orders to protect Draco — Dobby was following master's commands"
      - "House-elf binding magic matches the second shimmer on Snape"
      - "Hermione's timeline and alcove position clear her"
      - "Draco committed reckless dark magic but didn't complete the petrification"
      - "Dobby is a slave — the moral question of responsibility"

    correct_reasoning_requires:
      - "Question the assumption that one magical event caused the petrification"
      - "Recognize the dual signature as evidence of two separate actors"
      - "Use the timeline gap (10:02-10:05) to identify the second actor"
      - "Connect Dobby's physical evidence (frostbite, absence) to the crime"
      - "Understand that house-elf magic IS powerful enough to bind a wizard"
      - "Recognize that slavery, not malice, motivated Dobby"

    common_mistakes:
      - error: "Accuse Hermione"
        reason: "Strong motive, present at scene before attack, practiced petrification magic that day"
        why_wrong: "Was in eastern alcove 40 feet away. Candle burn time proves she didn't move. Her spell signatures don't match. She found Snape AFTER he was already frozen."

      - error: "Accuse Draco"
        reason: "Performed the ritual, fled the scene, has the artifact, overwhelming physical evidence"
        why_wrong: "Draco's own confession: Snape was still moving when he fled. The Hand of Glory stunned Snape but didn't fully petrify him. The dual shimmer proves a second magical event completed the job. Draco is guilty of reckless dark magic but not the complete petrification."

      - error: "Rule it an accident"
        reason: "Draco didn't intend harm, artifact malfunctioned"
        why_wrong: "Two separate magical acts. The Hand of Glory discharge may have been accidental, but the binding magic was deliberate — someone chose to freeze Snape."

    fallacies_to_catch:
      - fallacy: "confirmation_bias"
        example: "Locking onto Hermione because she had motive, ignoring timeline and magical evidence"

      - fallacy: "appeal_to_authority"
        example: "Trusting McGonagall's 'dark artifact discharge' interpretation without questioning the second shimmer"

      - fallacy: "anchoring_bias"
        example: "The evidence avalanche against Draco makes it hard to consider alternatives even when his confession contradicts his guilt"

      - fallacy: "capability_dismissal"
        example: "Dismissing Dobby because 'house-elf magic can't do this' — it can, and it did"

  # ---------------------------------------------------------------------------
  # WRONG SUSPECTS
  # ---------------------------------------------------------------------------
  wrong_suspects:
    hermione:
      moody_response: |
        MOODY: "Granger? You fell for the oldest trick in the book — motive
        blindness. Let me show you where you went wrong.

        Yes, Snape threatened to expel her. Yes, she was in the Restricted
        Section. Yes, her wand shows petrification spells.

        But the TIMELINE. She entered at 9:47, sat in the eastern alcove,
        forty feet away. The candle burned twenty minutes before she moved.
        She found Snape AFTER he was already frozen.

        And the MAGIC. Her spells are clean, controlled Petrificus Totalus.
        What hit Snape was two different magical effects — an artifact
        discharge AND something else entirely. Granger couldn't produce
        either one.

        You let a compelling story override the facts. Sloppy."
      why_innocent: "Timeline proves she was reading in the alcove during the attack. Her spell signatures don't match either magical effect on Snape."

    draco:
      moody_response: |
        MOODY: "Draco Malfoy. Close, recruit. Very close. But not quite right.

        Yes, Malfoy performed the ritual. Yes, his artifact discharged. Yes,
        he fled the scene. He's guilty of reckless dark magic — no question.

        But look at the EVIDENCE on Snape. Two magical signatures. Two
        DIFFERENT types of magic. The blue-white frost is the Hand of Glory.
        But that yellowish-green shimmer? That's house-elf binding magic.

        And Malfoy's own confession — he says Snape was STILL MOVING when
        he ran. If his artifact fully petrified Snape, why was the victim
        still conscious?

        Someone else was there. Someone finished what the artifact started.
        Someone who was following orders to protect the boy.

        You found the right crime but the wrong criminal. The artifact
        stunned Snape. Something else froze him. Think about who else was
        there that night."
      why_innocent: "Draco's artifact stunned Snape but didn't fully petrify him. His own confession confirms Snape was still moving. The dual shimmer proves a second magical event — house-elf magic — completed the petrification."

  # ---------------------------------------------------------------------------
  # POST-VERDICT CONTENT
  # ---------------------------------------------------------------------------
  post_verdict:
    correct:
