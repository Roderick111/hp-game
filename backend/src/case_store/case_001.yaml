# ============================================================================
# CASE 001: The Restricted Section (Full Redesign v3)
# ============================================================================
# Mystery structure:
# - Three-phase suspicion: Hermione (early) -> Draco (mid) -> Dobby (truth)
# - Tragic twist: Dobby is still a slave. Lucius ordered him to protect Draco.
#   He used house-elf binding magic on Snape when Snape tried to stop Draco's
#   ritual. The Hand of Glory discharge + house-elf binding = full petrification.
# - Evidence is RAW DATA — no self-interpreting descriptions
# - Each witness interprets evidence differently
# - Draco genuinely believes he did it (doesn't know Dobby was there)
#
# REVELATION PACING GUIDE:
# -------------------------
# EARLY (Hermione looks guilty):
#   - dropped_badge (places Hermione at scene)
#   - hallway_confrontation (Hermione's motive)
#   - hermione_book_slip (she was ALREADY there before the attack)
#   - hermione_wand_check (petrification magic that day)
#
# MID (Draco looks guilty — evidence avalanche):
#   - frost_pattern (dark magic discharge — but raw, no conclusion)
#   - ritual_book (someone was performing dark ritual)
#   - singed_cloak_fiber (expensive green fabric)
#   - torn_letter (Lucius → Draco about Hand of Glory)
#   - stolen_hellebore (in Draco's trunk)
#   - student_testimony (Draco left/returned terrified)
#
# LATE (something doesn't fit):
#   - wand_signature (Snape was helping, not attacking)
#   - dual_shimmer (TWO magic types on Snape — the crack)
#   - draco_confession (Snape was still moving when he fled)
#   - kitchen_log (Dobby absent 11 minutes during attack)
#   - lucius_order (parchment ordering Dobby to protect Draco)
#   - dobby_frostbite (physical evidence on Dobby's hands)
#
# CONFIRMATION:
#   - Timeline gap: Draco fled 10:02, Hermione found Snape 10:05
#   - Dual shimmer = wizard artifact + house-elf magic
#   - Dobby's disproportionate guilt/self-punishment
#   - Lucius's order + kitchen log + frostbite = airtight
# ============================================================================

case:
  id: "case_001"
  title: "The Restricted Section"
  difficulty: beginner
  description: "Professor Snape found petrified in the Restricted Section. Three suspects. Multiple crimes. One truth hidden beneath the obvious answer."

  crime_type: "assault"
  hook: "A professor frozen mid-reach. A student with motive. Another with means. And a house-elf who was just trying to help. The truth is darker than any of them admit."
  twist: "Draco's ritual stunned Snape but didn't finish the job. Dobby — still enslaved, following Lucius's orders — used house-elf binding magic to freeze Snape completely. The two magics layered together. Everyone assumes it was the Hand of Glory alone."

  # ---------------------------------------------------------------------------
  # WORLD CONTEXT (injected into narrator prompt for atmospheric grounding)
  # ---------------------------------------------------------------------------
  world_context: |
    It is the students' second year at Hogwarts. The Chamber of Secrets has been opened. Filch's cat, Mrs. Norris, was found petrified weeks ago. Messages about the "Heir of Slytherin" have appeared on the walls. Muggle-born students live in fear. The school is tense, divided, suspicious.

    Draco, Hermione, and the other students are twelve or thirteen years old — children dealing with forces beyond their understanding.

    Dobby is still enslaved by the Malfoy family. He has no legal rights. House-elves at Hogwarts work without pay, sleep in kitchens, and are invisible to most wizards. Dobby's growing conscience clashes with the binding magic that compels his obedience.

    Lucius Malfoy sits on the Hogwarts Board of Governors. His influence reaches everywhere. His letters to Draco mix parental expectation with pressure to uphold the family legacy. Draco desperately wants to prove himself worthy.

    The school atmosphere is one of whispered rumors, sidelong glances, and locked doors. Petrification is on everyone's mind. Anyone researching it — for any reason — looks suspicious.

  # ---------------------------------------------------------------------------
  # VICTIM
  # ---------------------------------------------------------------------------
  victim:
    name: "Severus Snape"
    age: "Potions Master, Head of Slytherin House"
    humanization: |
      The most feared professor at Hogwarts — harsh, unforgiving, brilliant.
      Three days ago, he discovered potion ingredients missing from his private stores.
      Yesterday, more vanished. He was hunting the thief when he found something worse.
      His arm is outstretched, reaching toward a student he was trying to protect.
      Even Snape didn't deserve this. Especially not for trying to help.
    memorable_trait: "Knew dark artifacts better than anyone — which is why he recognized the danger"
    time_of_death: "10:00 PM"
    cause_of_death: "Layered petrification: Hand of Glory discharge + house-elf binding magic"

  # ---------------------------------------------------------------------------
  # LOCATIONS
  # ---------------------------------------------------------------------------
  locations:
    # =========================================================================
    # Location 1: Library - Restricted Section (Crime Scene)
    # =========================================================================
    library:
      id: "library"
      name: "Restricted Section"
      type: "micro"

      description: >
        Frost on the windows. Unnatural cold.

        The Restricted Section spans three alcoves separated by towering shelves —
        each a world unto itself, sound muffled by ancient tomes. You stand in
        the western alcove. The eastern alcove, where a reading chair sits with
        a burned-down candle, is forty feet away and out of direct sight line.

        Professor Snape lies motionless near the reading desk. Black robes pooled
        around him. His right arm outstretched — reaching toward a circle of melted
        candles. His expression: not anger. Concern. His wand is partially drawn
        from his robes, as if he started to react to something.

        The smell of hellebore. Scattered herbs. The air feels wrong — heavy,
        charged, cold in a way that has nothing to do with the season.

        Under lamplight, Snape's skin has an odd shimmer — a pale blue-white
        sheen overlaid with something else, a faint yellowish-green tinge that
        catches the light at certain angles.

      surface_elements:
        - "Reading desk with scattered parchments and an ancient tome open to cramped handwriting"
        - "Circle of melted candles on the floor, ritual space cleared"
        - "Scattered dried herbs near the candle circle — pungent, unfamiliar smell"
        - "Frost-covered window with unnatural patterns radiating from floor"
        - "Snape's body — arm reaching toward the ritual circle, wand partially drawn, expression of concern"
        - "Odd dual-tone shimmer on Snape's skin: blue-white and yellowish-green"
        - "Faint scuff marks leading toward the exit"
        - "A dark green fiber caught on the doorframe"
        - "Eastern alcove visible in the distance — reading chair, burned-down candle"

      witnesses_present: ["hermione"]

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "specialis_revelio"
          - "lumos"
          - "prior_incantato"
        special_interactions:
          revelio:
            targets:
              - "desk"
              - "floor"
              - "papers"
              - "ritual circle"
              - "doorframe"
            reveals_evidence:
              - "dropped_badge"
              - "hidden_note"
              - "ritual_book"
              - "singed_cloak_fiber"
          prior_incantato:
            targets:
              - "snape's wand"
              - "wand"
              - "victim's wand"
            reveals_evidence:
              - "wand_signature"
          specialis_revelio:
            targets:
              - "frost"
              - "window"
              - "floor"
              - "ritual circle"
              - "snape"
              - "body"
              - "shimmer"
              - "skin"
            reveals_evidence:
              - "frost_pattern"
              - "dual_shimmer"
          lumos:
            targets:
              - "floor"
              - "exit"
              - "scuff marks"
              - "footprints"
              - "doorframe"
            reveals_evidence:
              - "scuff_marks"
              - "singed_cloak_fiber"

      hidden_evidence:
        # Dobby's apology note - initial ambiguity
        - id: "hidden_note"
          name: "Crumpled Apology Note"
          location_found: "library"
          type: "documentary"
          discovery_guidance: "Revealed when player searches the reading desk, examines papers, or uses Revelio on the desk area."
          description: |
            A small, crumpled note written in shaky, childlike handwriting:

            "Master Professor, D. is sorry. D. needed hellebore for sick friend.
            D. will return it. Please don't tell. — D."

            The date is from three days ago. The handwriting is crude, almost
            desperate. The letter "D." could refer to several people.
          tag: "[EVIDENCE: hidden_note]"
          significance: "Connects to an ingredient theft but not necessarily the attack. The 'D.' is ambiguous."
          strength: 40
          points_to: ["dobby", "draco"]
          witness_reactions:
            hermione: "That handwriting is too crude for a student. House-elves write like that — I've seen their kitchen logs."
            draco: "Probably that house-elf. They steal constantly. Nothing to do with me."
            mcgonagall: "This matches the first theft report. But there was a second theft yesterday — this note doesn't explain that one."
            dobby: "*ears flatten* Dobby... Dobby wrote that note. Dobby is sorry! But Dobby only took the hellebore ONCE!"

        # Snape's wand - proves he was trying to help
        - id: "wand_signature"
          name: "Snape's Wand Signature"
          location_found: "library"
          type: "magical"
          discovery_guidance: "Revealed when player casts Prior Incantato on Snape's wand or examines the wand magically."
          description: |
            Prior Incantato reveals Snape's wand activity:

            Last spell: "Finite Incantatem" (attempted cancellation)
            Cast: Moments before petrification
            Before that: "Lumos" (1 hour prior)

            No offensive spells. No defensive spells. His last act was an
            attempted cancellation of something.
          tag: "[EVIDENCE: wand_signature]"
          significance: "Snape was trying to cancel something, not attack or defend. Why?"
          strength: 85
          points_to: []
          witness_reactions:
            hermione: "Finite Incantatem? That's a cancellation spell. He was trying to STOP something, not fight someone."
            draco: "*goes very still* He... he was trying to stop it? Not... not punish me?"
            mcgonagall: "Finite Incantatem. Severus was attempting to safely shut down an active magical process. He walked into danger willingly."
            dobby: "*very quietly* The professor was trying to help... Dobby knows this."

        # Frost pattern - raw, no interpretation
        - id: "frost_pattern"
          name: "Unusual Frost Pattern"
          location_found: "library"
          type: "magical"
          discovery_guidance: "Revealed when player examines the frost patterns, window, or floor near the ritual circle. Specialis Revelio confirms magical origin."
          description: |
            Irregular crystalline frost covers a six-foot radius on the stone
            floor. The center point has a slight scorch mark beneath the frost.
            The temperature in this area is noticeably colder than the rest
            of the room.

            Specialis Revelio confirms magical origin — but the signature is
            complex. The frost radiates outward in a starburst pattern from
            the center. Something powerful discharged here.
          tag: "[EVIDENCE: frost_pattern]"
          significance: "Magical discharge at the ritual site. The source and nature are unclear."
          strength: 70
          points_to: []
          witness_reactions:
            hermione: "The center scorch is unusual. Freezing charms don't leave burns. This looks like combustion followed by rapid cold expansion — I've read about that in dark artifact theory."
            draco: "*changes subject quickly* Probably a malfunctioning ward. Old library, old magic."
            mcgonagall: "Dark artifact discharge. Several cursed objects produce frost like this — Hand of Glory, Cursed Opal, Winter's Grip amulet. I can't identify which from the pattern alone."
            dobby: "Dobby does not know about frost. Dobby was not there. *does not look at the evidence*"

        # THE KEY NEW EVIDENCE: dual shimmer on Snape
        - id: "dual_shimmer"
          name: "Dual-Tone Shimmer on Snape"
          location_found: "library"
          type: "magical"
          discovery_guidance: "Revealed when player examines Snape closely, casts Specialis Revelio on the body, or specifically investigates the unusual skin discoloration."
          description: |
            Specialis Revelio on Snape reveals two distinct magical layers:

            Layer 1: A pale blue-white residue, cold to the touch. Concentrated
            around Snape's torso and arms. Consistent with the frost on the floor.

            Layer 2: A faint yellowish-green shimmer, warmer, covering Snape's
            entire body more evenly. This second layer sits ON TOP of the first,
            as if applied moments after.

            Two separate magical effects. Two different signatures. Applied in
            sequence, not simultaneously.
          tag: "[EVIDENCE: dual_shimmer]"
          significance: "Two layers of magic on Snape. This is the key evidence that breaks the single-culprit theory."
          strength: 95
          points_to: []
          witness_reactions:
            hermione: "Two layers? That's... the blue-white is consistent with dark artifact discharge. But the yellowish-green — I've read about that color. *hesitates* I need to check something. It might be... no. It can't be."
            draco: "*genuinely confused* Two colors? I don't... I only used the one artifact. What's the second one?"
            mcgonagall: "The blue-white is artifact residue, certainly. The other color... *long pause* I've seen that tinge once before. In house-elf containment magic. But that would mean... no. That's impossible."
            dobby: "*tries to leave the conversation* Dobby does not understand wizard magic. The professors would know better than Dobby."

        # Hermione's badge - places her at scene
        - id: "dropped_badge"
          name: "Hermione's Library Badge"
          location_found: "library"
          type: "physical"
          discovery_guidance: "Revealed when player searches the floor near Snape's body, examines the ground, or uses Revelio on the scene."
          description: |
            A Gryffindor library access badge near Snape's body. The name
            engraved: "Hermione Granger." Students need these badges for
            after-hours Restricted Section access.
          tag: "[EVIDENCE: dropped_badge]"
          significance: "Places Hermione at the scene. Dropped during discovery or during the attack?"
          strength: 55
          points_to: ["hermione"]
          witness_reactions:
            hermione: "I dropped it when I found him! I was in the eastern alcove — I heard a sound, came to investigate, and found him like this. I panicked."
            draco: "Granger was there? Of course she was. She had that fight with Snape — everyone saw it. Seems obvious to me."
            mcgonagall: "Miss Granger had legitimate after-hours access. The badge proves she was there, not that she did anything."
            dobby: "Miss Granger is a kind witch. Dobby does not think she would hurt anyone."

        # Scuff marks - no size detail, just direction
        - id: "scuff_marks"
          name: "Scuff Marks on Floor"
          location_found: "library"
          type: "physical"
          discovery_guidance: "Revealed when player examines the floor, looks for tracks, or uses Lumos to illuminate the scuff marks."
          description: |
            Faint scuff marks on the polished stone floor lead from the ritual
            circle toward the exit. Under Lumos, they continue down the corridor
            in the direction of the dungeons.

            The stride suggests someone running. The marks are fresh — tonight's.
          tag: "[EVIDENCE: scuff_marks]"
          significance: "Someone fled the scene toward the dungeons. But multiple houses and areas are accessed through lower corridors."
          strength: 45
          points_to: []
          witness_reactions:
            hermione: "I didn't go that way. I went toward the main corridor to find help."
            draco: "Lots of students use that route. Half the castle is accessed through lower corridors. Doesn't mean anything."
            mcgonagall: "Several houses are reached through lower corridors, not just Slytherin. This narrows it but doesn't identify anyone."
            dobby: "Dobby does not leave marks on floors. House-elves are very quiet. *says this with odd emphasis*"

        # Singed cloak fiber
        - id: "singed_cloak_fiber"
          name: "Singed Fabric Fiber"
          location_found: "library"
          type: "physical"
          discovery_guidance: "Revealed when player examines the doorframe, investigates the exit, or looks for trace evidence."
          description: |
            A single fiber from a cloak, caught on the doorframe near the exit.
            The fiber is singed — as if exposed to magical discharge. The color
            is dark green. The weave suggests expensive fabric, not standard
            student robes.
          tag: "[EVIDENCE: singed_cloak_fiber]"
          significance: "Expensive green fabric caught fleeing the scene. Partial evidence."
          strength: 35
          points_to: []
          witness_reactions:
            hermione: "Green could be anyone. Slytherin students, professors with green robes, even some Ravenclaws wear dark green."
            draco: "I don't own the only green cloak in this school. That's hardly proof of anything."
            mcgonagall: "The weave is expensive. Not standard-issue. Someone from a wealthy family, perhaps."
            dobby: "Dobby does not wear cloaks. House-elves wear... what they are given. *tugs at pillowcase*"

        # Ritual book - proves premeditation
        - id: "ritual_book"
          name: "Open Book on Reading Desk"
          location_found: "library"
          type: "documentary"
          discovery_guidance: "Revealed when player examines the reading desk, investigates the open book, or uses Revelio on the desk area."
          description: |
            The book on the reading desk is open to a chapter titled:
            "Activation Rites for Bound Artifacts"

            The instructions describe a ritual requiring: a circle of seven
            candles, fresh hellebore, and a spoken incantation. A note in the
            margin (elegant handwriting, expensive ink): "Use the hellebore
            from Father's package. Don't let Snape catch you — he'll recognize it."

            Someone was following these instructions. Someone who received a
            package from their father. Someone worried about Snape specifically.
          tag: "[EVIDENCE: ritual_book]"
          significance: "Someone planned a ritual here. The margin note suggests a student with a wealthy father."
          strength: 75
          points_to: ["draco"]
          witness_reactions:
            hermione: "That handwriting isn't mine. It's elegant — aristocratic. And 'Father's package'? Only certain families send packages like that."
            draco: "*jaw tightens* Anyone could have written that. People write in library books all the time."
            mcgonagall: "That handwriting is distinctive. I've seen it on essays. *does not name the student yet*"
            dobby: "Dobby has seen young master's handwriting many times. *catches himself* Dobby means... Dobby does not know who wrote that."

        # Hermione's book slip - she was ALREADY there
        - id: "hermione_book_slip"
          name: "Library Access Slip and Book"
          location_found: "library"
          type: "documentary"
          discovery_guidance: "Revealed when player investigates the eastern alcove, examines the reading chair area, or searches for other occupants."
          description: |
            In the eastern alcove, forty feet from the crime scene, a library slip sits inside a book: "Restricted Access — H. Granger."

            The book is "Petrification: Causes, Cures, and Controversies." Several pages are bookmarked — chapters on binding magic, basilisk-induced petrification, and counter-curses.

            The alcove shows signs of recent use — a reading chair slightly displaced, a candle stub that has burned down roughly twenty minutes' worth. The alcove is around a corner from the main scene, separated by towering shelves that muffle sound.
          tag: "[EVIDENCE: hermione_book_slip]"
          significance: "Hermione was already in the Restricted Section BEFORE the attack — reading a book about petrification. Innocent research or preparation?"
          strength: 70
          points_to: ["hermione"]
          witness_reactions:
            hermione: "I was researching petrification because of the CHAMBER attacks! Mrs. Norris was petrified! Muggle-borns are being targeted! Someone has to understand what's happening — and that book covers counter-curses too!"
            draco: "She was reading a book about petrification? The same night a professor got petrified? And she was ALREADY there? How much more obvious can it get?"
            mcgonagall: "The candle burn time is consistent — she was reading for roughly twenty minutes before the incident. The book itself... many students have been researching petrification since the Chamber attacks. It's concerning but not conclusive."
            dobby: "Dobby knows Miss Granger reads a lot. She is always in the library."

        # ATMOSPHERIC: Pince's confiscation log — world-building, Chamber of Secrets fear
        - id: "pince_confiscation_log"
          name: "Madam Pince's Confiscation Notes"
          location_found: "library"
          type: "documentary"
          discovery_guidance: "Revealed when player searches Madam Pince's desk, examines library records, or investigates the librarian's area."
          description: |
            A clipboard near the library entrance, Madam Pince's neat handwriting:

            "CONFISCATED MATERIALS — This Term:
            - 'Moste Potente Potions' — returned to shelf after student inspection (Second-year Gryffindor, authorized note from Lockhart)
            - Dark Arts pamphlet circulating in Slytherin common room
            - Three students caught trying to access Chamber of Secrets mythology section after hours
            - Graffiti cleaned from shelf: 'ENEMIES OF THE HEIR BEWARE'

            NOTE: Increased traffic to petrification-related texts since the attack on Mrs. Norris. Half the school seems to be researching it. Restricted Section requests up 300%."
          tag: "[EVIDENCE: pince_confiscation_log]"
          significance: "Shows the school atmosphere — petrification research is widespread, not unique to any suspect. World context."
          strength: 10
          points_to: []
          witness_reactions:
            hermione: "See? EVERYONE is researching petrification. I'm not the only one. The whole school is scared."
            draco: "Pince confiscates things from everyone. This doesn't mean anything."
            mcgonagall: "The Chamber attacks have the entire school on edge. This is... context, not evidence."
            dobby: "Dobby has heard the students whispering about the Chamber. Everyone is frightened."

        # ATMOSPHERIC: Damaged ward stone — shows magical stress from multiple events
        - id: "damaged_ward_stone"
          name: "Stressed Ward Stone"
          location_found: "library"
          type: "magical"
          discovery_guidance: "Revealed when player examines the library entrance carefully, casts Specialis Revelio on the doorway, or investigates the magical protections."
          description: |
            A small ward stone embedded in the doorframe of the Restricted Section shows hairline fractures. Specialis Revelio reveals it has been stressed by multiple magical events — not just tonight's.

            The stone's protective enchantments are weakened. Whatever protections the Restricted Section once had against unauthorized magic have been failing for weeks. The Chamber of Secrets attacks have strained Hogwarts' wards throughout the castle.

            Tonight's magical discharge was the final blow to this stone.
          tag: "[EVIDENCE: damaged_ward_stone]"
          significance: "The castle's wards are weakening from the Chamber attacks. The Restricted Section had degraded protections — anyone could have performed magic here undetected."
          strength: 15
          points_to: []
          witness_reactions:
            hermione: "The wards are failing? That explains why no alarm went off when... when whatever happened here happened. The Chamber attacks are draining the castle's magic."
            draco: "Ward stones break all the time in old castles. This building is a thousand years old."
            mcgonagall: "I... was not aware the wards had degraded this far. This is deeply concerning. It means we have no magical record of who entered tonight."
            dobby: "House-elves can feel when the castle is hurting. The magic has been... wrong... for weeks."

      not_present:
        - triggers:
            - "secret passage"
            - "hidden door"
            - "escape route"
          response: "The walls are solid stone. No hidden passages here — just shelves and books."
        - triggers:
            - "hand of glory"
            - "the artifact"
            - "cursed object"
          response: "Whatever artifact was used here, it's gone. Whoever fled took it with them."

    # =========================================================================
    # Location 2: Slytherin Common Room
    # =========================================================================
    slytherin_common_room:
      id: "slytherin_common_room"
      name: "Slytherin Common Room"
      type: "micro"

      description: >
        Professor McGonagall's authorization spell tingles at your wrist —
        temporary access for the investigation. The stone wall slides open.
        You're not welcome here. Every surface reminds you.

        The Slytherin common room stretches beneath the Black Lake. Green-tinted
        light filters through windows looking into murky water. Leather armchairs
        surround a dying fireplace. The room is quiet. Most students in bed.

        Draco Malfoy's corner is unmistakable — the most expensive armchair, worn
        from habitual use. His trunk sits nearby, closed, silver "DM" monogram
        catching the green light. A writing desk holds mundane correspondence.

        The smell of something herbal lingers near the trunk. Faint. Familiar.

      surface_elements:
        - "Green-tinted lake windows casting eerie light"
        - "Leather armchairs near dying fireplace, one worn more than others"
        - "Writing desk with mundane correspondence"
        - "Draco Malfoy's trunk — closed, silver 'DM' monogram"
        - "Faint herbal smell near the trunk area"
        - "A few students still awake, watching you with cold curiosity"

      witnesses_present: []

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "lumos"
          - "specialis_revelio"
        special_interactions:
          revelio:
            targets:
              - "trunk"
              - "draco's trunk"
              - "draco's belongings"
              - "malfoy's things"
            reveals_evidence:
              - "torn_letter"
              - "stolen_hellebore"
          specialis_revelio:
            targets:
              - "trunk"
              - "draco's things"
              - "robes"
            reveals_evidence:
              - "residual_dark_magic"

      hidden_evidence:
        # Lucius's letter - connects Hand of Glory to Draco
        - id: "torn_letter"
          name: "Letter from Lucius Malfoy"
          location_found: "slytherin_common_room"
          type: "documentary"
          discovery_guidance: "Revealed when player searches Draco's trunk, uses Revelio on it, or investigates Draco's belongings."
          description: |
            Hidden beneath Draco's robes in his trunk — a letter on expensive
            parchment, partially burned at the edges. The Malfoy family crest
            is visible:

            "Draco,

            The package has arrived. A genuine Hand of Glory — one of three
            known to exist. Your grandfather used it during the first war.

            The activation ritual is in the Restricted Section. You'll need
            fresh hellebore. I've included some, but if you need more, Snape
            keeps stores in his office. Be careful — Severus will recognize
            the artifact.

            Make our family proud.
            — Father"

            The letter is dated four days ago.
          tag: "[EVIDENCE: torn_letter]"
          significance: "Connects Draco to the Hand of Glory and the ritual. His father sent it."
          strength: 90
          points_to: ["draco"]
          witness_reactions:
            hermione: "Lucius Malfoy sent his son an illegal dark artifact? That's... that's criminal. But it proves Draco was doing a ritual, not necessarily that he attacked Snape."
            draco: "*defeated* Fine. Father sent me the Hand of Glory. It's a family heirloom. I was trying to activate it. That's all."
            mcgonagall: "Lucius Malfoy. Of course. The apple doesn't fall far from the tree. But this letter also warns Draco about Snape — he knew Snape would try to stop it."
            dobby: "*trembling* Old Master Lucius... he sent many things to young master. Dobby... Dobby was not the only thing he sent."

        # Stolen hellebore in Draco's trunk
        - id: "stolen_hellebore"
          name: "Stolen Hellebore"
          location_found: "slytherin_common_room"
          type: "physical"
          discovery_guidance: "Revealed when player searches Draco's trunk or notices the herbal smell near his things."
          description: |
            Inside Draco's trunk, hidden beneath robes: a pouch of dried
            hellebore with "Snape's Private Stores" stamped on the fabric.
            The same type of hellebore scattered at the crime scene.

            This is from a SECOND theft — the one that happened yesterday,
            after the apology note. The note only explains the first theft.
          tag: "[EVIDENCE: stolen_hellebore]"
          significance: "Draco committed the second theft. Connects him to ritual ingredients."
          strength: 80
          points_to: ["draco"]
          witness_reactions:
            hermione: "Two separate thefts. The note was from three days ago — this is from yesterday. Different thieves, different purposes."
            draco: "I... Father's supply wasn't enough. I needed more for the ritual. I was going to replace it."
            mcgonagall: "Two thefts. The first was Dobby's — he confessed. The second was someone else entirely. Now we know who."
            dobby: "Dobby only stole ONCE! This is not Dobby's! Someone else took more hellebore!"

        # Dark magic residue on Draco's things
        - id: "residual_dark_magic"
          name: "Dark Magic Residue"
          location_found: "slytherin_common_room"
          type: "magical"
          discovery_guidance: "Revealed when player casts Specialis Revelio on Draco's trunk or belongings."
          description: |
            Specialis Revelio reveals traces of dark magic on Draco's trunk
            lining and robes. The signature has a cold, blue-white quality
            that matches the frost at the crime scene.

            Whatever was stored here was saturated with the same energy
            that left frost on the library floor.
          tag: "[EVIDENCE: residual_dark_magic]"
          significance: "The source of the frost pattern was stored in Draco's trunk. Links artifact to Draco."
          strength: 80
          points_to: ["draco"]
          witness_reactions:
            hermione: "The cold signature matches the crime scene frost. Whatever caused that frost was kept here."
            draco: "Yes, the Hand of Glory was in my trunk. I already admitted that. What more do you want?"
            mcgonagall: "The magical residue is consistent with the library frost. This confirms Draco brought the artifact."
            dobby: "Dark magic... Dobby has felt that cold before. In the old manor. Bad things lived in that house."

        # Student witness testimony — more divided
        - id: "student_testimony"
          name: "Slytherin Student Accounts"
          location_found: "slytherin_common_room"
          type: "testimonial"
          discovery_guidance: "Revealed when player questions Slytherin students about that night."
          description: |
            Students give conflicting accounts:

            "Draco left before curfew, maybe quarter to ten? Carrying something
            wrapped in cloth. Said he was 'going to study.' Nervous, but excited."

            "He came back not long after. White as a ghost, hands shaking."

            But Pansy Parkinson insists: "He was just carrying books. His father
            sends him rare books all the time. And he came back much later — I was
            almost asleep. You're all exaggerating."

            Another student: "Pansy wasn't even in the common room when he left.
            She's covering for him."

            "When Pansy asked if he was okay, he snapped at her. Said something
            like 'It wasn't supposed to happen like that.' Then locked himself in."
          tag: "[EVIDENCE: student_testimony]"
          significance: "Students place Draco leaving and returning, but accounts conflict on timing and details."
          strength: 65
          points_to: ["draco"]
          witness_reactions:
            hermione: "Conflicting witness accounts are normal. But they all agree on one thing — he came back terrified. Something happened to him."
            draco: "They don't know what they saw. Pansy's right — I was carrying books. *less convincing each time*"
            mcgonagall: "Student testimony is unreliable on specifics but reliable on emotional states. They all agree Draco was terrified when he returned."
            dobby: "Dobby... Dobby also saw young master leaving that night. *whispered*"

        # ATMOSPHERIC: Draco's unsent letter — character depth, family pressure
        - id: "draco_unsent_letter"
          name: "Draco's Unsent Letter"
          location_found: "slytherin_common_room"
          type: "documentary"
          discovery_guidance: "Revealed when player examines Draco's writing desk, searches his correspondence, or investigates the desk area."
          description: |
            A crumpled, unsent letter on Draco's writing desk, in his handwriting:

            "Father,

            I have the package. I understand what is expected of me. I will not disappoint you.

            But I wanted to ask — did Grandfather really use this during the war? Did he ever"

            The letter stops mid-sentence. Several words are crossed out below: "hurt anyone" is scratched through twice. The parchment is wrinkled as if gripped tightly.

            He never finished it. He never sent it.
          tag: "[EVIDENCE: draco_unsent_letter]"
          significance: "Draco had doubts. He was scared of the artifact but couldn't admit it to his father. A child under pressure."
          strength: 20
          points_to: ["draco"]
          witness_reactions:
            hermione: "He was scared. He was asking if his grandfather hurt anyone with it and he couldn't even finish the question. *quietly* He's twelve years old."
            draco: "*snatches at the letter* That's PRIVATE. You have no right— *voice breaks* Give it back."
            mcgonagall: "*reads it slowly, expression softening* He was frightened. A child asking his father a question he couldn't bear to hear answered."
            dobby: "Young master... young master was always trying to make old master proud. Even when it scared him."

      not_present:
        - triggers:
            - "hand of glory"
            - "the artifact"
            - "cursed object"
          response: "If the Hand of Glory was here, it's been hidden or disposed of. It's not in the trunk or anywhere visible."

    # =========================================================================
    # Location 3: Third Floor Corridor (Witness location)
    # =========================================================================
    third_floor_corridor:
      id: "third_floor_corridor"
      name: "Third Floor Corridor"
      type: "micro"

      description: >
        The third floor corridor outside the library. Torches flicker in wall
        sconces, casting long shadows across worn flagstones. A window at the
        corridor's end offers a clear view of the grounds.

        This is McGonagall's patrol route. From here, she can see the library
        doors, the stairway to the dungeons, and the main corridor. A portrait
        of a dozing wizard hangs near the library entrance.

      surface_elements:
        - "Flickering torches in wall sconces"
        - "Window overlooking moonlit grounds"
        - "Stone floor showing faint patrol wear patterns"
        - "Portrait of a dozing wizard near library entrance"
        - "Clear sight lines to library doors and dungeon stairs"
        - "Scuff marks near the wall where Snape cornered Hermione that afternoon"

      witnesses_present: ["mcgonagall"]

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "lumos"

      hidden_evidence:
        # Witness account of afternoon confrontation
        - id: "hallway_confrontation"
          name: "Witness Account: Afternoon Confrontation"
          location_found: "third_floor_corridor"
          type: "testimonial"
          discovery_guidance: "Revealed when player asks about earlier events, investigates what happened before the attack, or questions about Hermione and Snape."
          description: |
            Multiple students witnessed an incident around 4 PM:

            "Snape cornered Granger right here. He was furious — said something
            about 'unauthorized combat instruction' and 'immediate expulsion.'
            Granger looked terrified, then angry. She said 'You can't do this!'
            and ran off."

            "Snape called after her: 'Tomorrow morning, Miss Granger. The
            Headmaster will hear everything.'"

            "Granger was crying in the library afterward. She was there for hours."
          tag: "[EVIDENCE: hallway_confrontation]"
          significance: "Establishes Hermione had strong motive. But motive isn't proof."
          strength: 60
          points_to: ["hermione"]
          witness_reactions:
            hermione: "Yes, it happened. Everyone saw it. I know how it looks. But I was researching my DEFENSE, not planning an attack!"
            draco: "Granger's been sneaking around teaching Longbottom combat spells. Snape caught her. She had every reason to want him silenced."
            mcgonagall: "The confrontation was... harsh, even by Severus's standards. I was planning to mediate the next morning. Miss Granger was upset, but I know her. She fights with words and precedents, not curses."
            dobby: "Professor Snape was very angry that day. Dobby heard shouting from the corridor."

        # NEW: Lucius's order to Dobby
        - id: "lucius_order"
          name: "Torn Parchment Fragment"
          location_found: "third_floor_corridor"
          type: "documentary"
          discovery_guidance: "Revealed when player searches the corridor floor near the library entrance, examines the area thoroughly, or uses Revelio on the corridor."
          description: |
            A torn piece of parchment found under a bench near the library entrance. Written in a cramped, formal hand — older than a student's:

            "...the boy is undertaking important family business. You are to ensure he is not harmed, caught, or interfered with. Protect him at all costs. Do not..."

            The rest is torn away. The parchment is expensive, the ink is high quality. This was written by someone wealthy, giving instructions to someone else about protecting a boy.
          tag: "[EVIDENCE: lucius_order]"
          significance: "Someone was given orders to protect a boy 'at all costs.' Who wrote this? Who received it? Which boy?"
          strength: 85
          points_to: []
          witness_reactions:
            hermione: "'Important family business'? 'Protect him at all costs'? Someone knew this was going to happen and sent a... protector. *pauses* Who would Lucius Malfoy give such orders to?"
            draco: "*goes pale, long silence* Father sent someone to watch me? I didn't... I didn't know about this."
            mcgonagall: "This is Lucius Malfoy's handwriting. I recognize it from his board correspondence. He was giving instructions to someone — but to whom?"
            dobby: "*silence, then tries to bite his own hand before stopping* Dobby... Dobby cannot say. Please. *shaking violently*"

        # ATMOSPHERIC: Prefect patrol notes — explains security gaps
        - id: "prefect_patrol_notes"
          name: "Prefect Patrol Schedule"
          location_found: "third_floor_corridor"
          type: "documentary"
          discovery_guidance: "Revealed when player examines the corridor notice board, investigates patrol schedules, or asks about security."
          description: |
            A patrol schedule pinned to a small notice board near the stairs:

            "PREFECT PATROLS — Modified Schedule (Chamber Emergency):
            Third Floor Corridor: Reduced to hourly checks.
            Dungeons: DOUBLED patrols (Chamber entrance suspected nearby).
            Library Wing: Coverage SUSPENDED after 9 PM — insufficient prefects. Professor staff patrol only.

            NOTE FROM HEAD BOY: With half the prefects refusing night patrol after the Chamber attacks, we cannot guarantee full corridor coverage. Report any suspicious activity to Professor McGonagall or Professor Flitwick."

            The library wing had no prefect coverage after 9 PM. Only McGonagall's patrol route passed this corridor.
          tag: "[EVIDENCE: prefect_patrol_notes]"
          significance: "Security gaps explain how multiple people accessed the Restricted Section undetected. The Chamber attacks weakened school security."
          strength: 15
          points_to: []
          witness_reactions:
            hermione: "Half the prefects refusing patrol? I didn't know it was that bad. No wonder the corridor was empty."
            draco: "If there were proper patrols, none of this would have... *stops himself*"
            mcgonagall: "I've been stretching the staff thin trying to cover the gaps. The Chamber situation has consumed our resources. This corridor only had my patrol — and I can't be everywhere."
            dobby: "House-elves see the empty corridors at night. The castle feels... abandoned after dark now."

      not_present:
        - triggers:
            - "blood"
            - "evidence of struggle"
          response: "No signs of violence here. Whatever happened was inside the Restricted Section."

    # =========================================================================
    # Location 4: Hogwarts Kitchens (Dobby's location)
    # =========================================================================
    kitchens:
      id: "kitchens"
      name: "Hogwarts Kitchens"
      type: "micro"

      description: >
        You tickle the pear. It giggles, squirms, and becomes a door handle.

        The vast Hogwarts kitchens stretch before you, directly below the Great
        Hall. Brass pots and pans hang from the ceiling, gleaming in the firelight
        of a dozen hearths. House-elves bustle about even at this hour.

        In the corner near the hospital wing corridor, you spot a small elf with
        tennis-ball-sized green eyes. Dobby. He sits beside a makeshift cot where
        another elf — Winky — rests under a patchwork blanket. His corner is
        neater than the others. Mismatched socks displayed proudly on a small shelf.

        He looks up as you approach. His ears droop. He knows why you're here.

        You notice his hands are wrapped in cloth bandages. Unusual for a
        house-elf who uses magic, not manual labor.

      surface_elements:
        - "Brass cookware hanging from ceiling"
        - "Four long preparation tables"
        - "Busy house-elves working quietly"
        - "Small cot with Winky resting under patchwork blanket"
        - "Dobby sitting beside his friend, ears drooping"
        - "Dobby's hands wrapped in cloth bandages"
        - "Kitchen log book hanging by the door"
        - "Dobby's corner: neater than most, mismatched socks displayed"

      witnesses_present: ["dobby"]

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "lumos"
          - "specialis_revelio"
        special_interactions:
          revelio:
            targets:
              - "dobby's belongings"
              - "corner"
              - "cot area"
              - "log"
              - "kitchen log"
            reveals_evidence:
              - "healing_supplies"
              - "kitchen_log"
          specialis_revelio:
            targets:
              - "dobby"
              - "dobby's hands"
              - "bandages"
            reveals_evidence:
