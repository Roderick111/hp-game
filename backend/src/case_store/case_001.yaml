  briefing:
    case_id: "case_001"

    dossier:
      title: "The Restricted Section"
      victim: "Severus Snape (Potions Master)"
      location: "Hogwarts Library - Restricted Section"
      time: "22:00 (Found)"
      status: "Petrified / St. Mungo's"
      synopsis: |
        Professor Snape found petrified in the Restricted Section. Evidence of
        magical discharge — frost patterns, ritual materials, scattered herbs.

        Three people had reason to be near the scene that night. One had motive.
        One had means. One was hiding something else entirely.

        **How to investigate:** Type what you want to do — *"examine the frost patterns"*, *"cast Specialis Revelio on the body"*, *"search the desk"*. Be specific. The more precise your actions, the more you'll find.

        **Talk to witnesses** by selecting them from the sidebar. Ask questions, build trust, and **present evidence** to see how they react — different people interpret the same clue differently.

        When you're ready, **submit your verdict**. But don't rush — the obvious answer is rarely the right one.

    teaching_question:
      prompt: "A student with strong motive is found at a crime scene. What should you investigate FIRST?"
      concept_summary: "Physical evidence and timeline are more reliable than motive and behavior."
      choices:
        - id: "choice_a"
          text: "Their motive and opportunity"
          response: |
            *Mad-Eye Moody frowns*

            "Motive and opportunity make them a SUSPECT, not a CULPRIT.
            Half the people in any crime have motive. Physical evidence
            and timeline are what separate the guilty from the unlucky."

        - id: "choice_b"
          text: "The physical evidence and timeline"
          response: |
            *Mad-Eye Moody nods*

            "Correct. Physical evidence doesn't lie — though it can be
            misread. Timelines eliminate suspects. A compelling story means
            nothing if the facts contradict it.

            But remember: evidence can have layers. Don't stop at the first
            explanation that fits."

        - id: "choice_c"
          text: "Whether they're acting suspicious"
          response: |
            *Mad-Eye Moody's eye spins*

            "Behavior is the WORST indicator of guilt. Innocent people
            act guilty when accused. Guilty people act innocent when
            confident. I've seen killers cry and victims look cold.

            Facts. Evidence. Timeline. Not behavior. FACTS."

    rationality_concept: "physical_evidence_primacy"
    concept_description: "Physical evidence and timeline trump motive and behavior. But evidence can have layers — don't stop at the first explanation."

    transition: |
      *Mad-Eye Moody's magical eye spins, locking onto you*

      Three suspects. Multiple crimes. Layers you haven't seen yet.

      A student who had a screaming match with the victim. Another student
      seen fleeing the scene. A house-elf who was already stealing from
      the victim.

      Everyone has secrets. Everyone looks guilty of something. Your job
      is to figure out who's guilty of THIS.

      Examine the crime scene carefully. Question the witnesses. And
      recruit — look at the EVIDENCE on Snape himself. Look closely.
      Things aren't always what they seem at first glance.

      **CONSTANT VIGILANCE.**

