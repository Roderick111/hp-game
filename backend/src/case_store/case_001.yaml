        - speaker: "moody"
          text: >
            *Mad-Eye Moody's magical eye fixes on the small figure*

            "Dobby. Step forward."

        - speaker: "dobby"
          text: >
            *Dobby steps forward, trembling. He does not resist. He does not deny.*

            Dobby knew this day would come. Dobby has been waiting.
          tone: "resigned"

        - speaker: "moody"
          text: >
            "You used house-elf binding magic on Professor Snape while
            he was trying to save a student from his own stupidity. Your magic
            combined with the artifact's discharge and caused full petrification.

            Is this true?"

        - speaker: "dobby"
          text: >
            *quietly*

            Yes, sir. Dobby did this. Master Lucius said protect young master
            Draco. The professor was reaching for him. Dobby... Dobby only
            wanted to hold the professor still for a moment. Just long enough
            for young master to run.

            But Dobby's magic and the cold magic... they mixed. And the
            professor stopped. Completely.

            *tears running down face*

            The professor was trying to HELP young master Draco. Dobby knows
            that now. The professor's last spell was to SAVE him. And Dobby
            stopped the one person trying to protect his master's son.

            Dobby is the worst elf who ever lived.
          tone: "broken"

        - speaker: "moody"
          text: >
            *long pause*

            "And Draco Malfoy? He doesn't even know you were there?"

        - speaker: "dobby"
          text: >
            Young master didn't see Dobby. Young master thinks HE did it.
            Young master has been suffering for what he thinks he did.

            *wringing hands*

            That is also Dobby's fault.
          tone: "whisper"

        - speaker: "moody"
          text: >
            *Moody turns to you*

            "Here's the question that doesn't have a clean answer,
            recruit. Dobby is a slave. He was following his master's orders.
            The magic that enslaves him makes disobedience physically painful.

            Can you hold a slave responsible for obeying?

            Lucius Malfoy wrote those orders. Lucius sent the artifact. Lucius
            set every piece in motion. And Lucius will face no consequences
            unless someone forces the issue.

            Dobby didn't choose this. But Snape is still frozen in St. Mungo's.

            *magical eye spinning*

            There's no clean answer here. Sometimes justice is a question
            without a satisfying response. Write it up, recruit. All of it.
            Let the Wizengamot sort out what we can't."

      aftermath: >
        Dobby was placed under Ministry custody while the Wizengamot debated
        a question it had never seriously considered: can a house-elf be held
        criminally responsible for actions taken under magical compulsion?

        The trial became a landmark case. Hermione Granger — the student
        Dobby had helped frame by his silence — became his most vocal
        defender, arguing that the real criminals were the institution of
        house-elf slavery and Lucius Malfoy specifically.

        Draco Malfoy was expelled for possession and reckless use of a
        dark artifact. When he learned that Dobby — not his ritual — had
        actually petrified Snape, he sat in silence for a very long time.
        Then he said: "Father sent him to protect me. And I let Snape
        take the blame." It was the first time anyone had seen a Malfoy
        express something like shame.

        Lucius Malfoy faced an inquiry for providing a dangerous artifact
        to a minor AND for ordering a house-elf to assault a Hogwarts
        professor. His political connections reduced consequences, as
        always. But the parchment was entered into public record.

        Professor Snape was revived after five days in St. Mungo's. His
        first words: "Is the Malfoy boy safe?" When told the full truth,
        he was quiet for a long time. Then: "The elf did what any of us
        would have done for someone we're bound to protect. The crime
        isn't his. It's the chain."

        Dobby was eventually freed — not by the Malfoys, but by a legal
        precedent established during his trial. He returned to Hogwarts
        kitchens a free elf. He never stopped punishing himself for what
        he did to Snape. But now, at least, he could choose.

    incorrect:
      - suspect_accused: "hermione"
        reveal: >
          *Mad-Eye Moody shakes his head*

          MOODY: "Wrong, recruit. You fell for motive blindness.

          Yes, Hermione had reason to want Snape stopped. But the TIMELINE
          clears her — she was reading in the eastern alcove when the attack
          happened. The candle burn proves she didn't move.

          And look at Snape's condition. TWO magical signatures. An artifact
          discharge AND house-elf binding magic. Hermione couldn't produce
          either one.

          The real story: Draco Malfoy performed a dark ritual that stunned
          Snape. Then Dobby — following Lucius's orders to protect Draco —
          used binding magic to finish the job. Two crimes, two perpetrators,
          and a slave who had no choice."

        teaching_moment: >
          You prioritized MOTIVE over EVIDENCE. Hermione's story looked
          guilty. But the physical evidence told a different story:
          TIMELINE — She was in the alcove before and during the attack.
          MAGIC — Two signatures on Snape, neither matches her spells.
          POSITION — 40 feet away, around a corner, acoustically separated.

          Lesson: Motive makes someone a suspect. Evidence makes them guilty.

        confrontation_anyway: true

      - suspect_accused: "draco"
        reveal: >
          *Mad-Eye Moody's eye spins slowly*

          MOODY: "Close, recruit. Very close. But incomplete.

          Yes, Draco performed the ritual. Yes, his artifact discharged.
          He's guilty of reckless dark magic. But he didn't FINISH the job.

          His own confession: Snape was still MOVING when he fled. The
          Hand of Glory stunned Snape but didn't fully petrify him.

          Look at Snape's skin. TWO magical signatures. The blue-white is
          the artifact. The yellowish-green is house-elf binding magic.

          Dobby was there. Lucius ordered him to protect Draco. When Snape
          was still reaching for the boy after the discharge, Dobby used
          binding magic. The two spells layered and caused full petrification.

          You found half the truth. The harder half was hiding in plain sight."

        teaching_moment: >
          You fell for ANCHORING BIAS. The evidence against Draco was so
          overwhelming that you stopped looking for alternatives — even when
          his own testimony contradicted his guilt.

          Key missed evidence:
          DUAL SHIMMER — Two magic types, not one.
          DRACO'S CONFESSION — Snape was still moving when he fled.
          KITCHEN LOG — Dobby absent during the attack window.
          FROSTBITE — Dobby's hands show both magical signatures.

          Lesson: When a suspect's own confession doesn't fully explain the
          evidence, something else happened. Keep looking.

        confrontation_anyway: true

