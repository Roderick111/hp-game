# ============================================================================
# CASE 001: The Restricted Section (Revised)
# ============================================================================
# Beginner case with layered complexity:
# - Three-phase suspicion: Dobby (quick) -> Hermione (serious) -> Draco (truth)
# - Tragic twist: Snape was protecting Draco, not confronting him
# - Connected threads: Both Dobby and Draco stole hellebore (different reasons)
#
# REVELATION PACING GUIDE:
# -------------------------
# EARLY (all suspects viable):
#   - hidden_note ("D." ambiguity)
#   - dropped_badge (places Hermione at scene)
#   - hallway_confrontation (Hermione's motive)
#   - singed_cloak_fiber (partial, points to Slytherin)
#
# MID (Dobby weakened, Hermione/Draco viable):
#   - frost_pattern (Hand of Glory = wizard magic, not house-elf)
#   - muddy_footprints (wrong size for Hermione, toward Slytherin)
#   - hermione_wand_check (different spell type)
#   - healing_supplies (Dobby used hellebore for medicine)
#
# LATE (Draco emerges as culprit):
#   - ritual_book (marginal notes reveal wealthy father, fear of Snape)
#   - torn_letter (direct connection to Hand of Glory)
#   - stolen_hellebore (second theft was Draco)
#
# CONFIRMATION (certainty):
#   - wand_signature (Snape was helping, not attacking)
#   - student_testimony (Draco left/returned with wrapped object)
#   - residual_dark_magic (on Draco's belongings)
#   - Dobby's testimony (saw Draco sneaking both ways)
# ============================================================================

case:
  id: "case_001"
  title: "The Restricted Section"
  difficulty: beginner
  description: "Professor Snape found petrified in the Restricted Section. Three people had reasons to be there that night. One had reason to want him silenced."

  crime_type: "assault"
  hook: "A professor frozen mid-reach. A student with motive. A house-elf with secrets. The truth is darker than any of them admit."
  twist: "Snape wasn't attacking Draco—he was trying to save him. The one person who could have prevented this tragedy became its victim."

  # ---------------------------------------------------------------------------
  # VICTIM
  # ---------------------------------------------------------------------------
  victim:
    name: "Severus Snape"
    age: "Potions Master, Head of Slytherin House"
    humanization: |
      The most feared professor at Hogwarts—harsh, unforgiving, brilliant.
      Three days ago, he discovered potion ingredients missing from his private stores.
      Yesterday, more vanished. He was hunting the thief when he found something worse.
      His arm is outstretched, reaching toward a student he was trying to protect.
      Even Snape didn't deserve this. Especially not for trying to help.
    memorable_trait: "Knew dark artifacts better than anyone—which is why he recognized the danger"
    time_of_death: "10:00 PM"
    cause_of_death: "Petrification curse from Hand of Glory discharge"

  # ---------------------------------------------------------------------------
  # LOCATIONS
  # ---------------------------------------------------------------------------
  locations:
    # =========================================================================
    # Location 1: Library - Restricted Section (Crime Scene)
    # =========================================================================
    library:
      id: "library"
      name: "Hogwarts Library - Restricted Section"
      type: "micro"

      description: |
        Frost on the windows. Unnatural cold.

        The Restricted Section spans three alcoves separated by towering shelves—
        each a world unto itself, sound muffled by ancient tomes. You stand in
        the western alcove. The eastern alcove, where Hermione was researching,
        is forty feet away and out of direct sight line.

        Professor Snape lies motionless near the reading desk. Black robes pooled
        around him. His right arm outstretched—reaching toward a circle of melted
        candles. Toward something that's no longer there. His expression: not
        anger. Concern. He was trying to help someone.

        The smell of hellebore. Scattered herbs. The residue of dark magic hangs
        in the air like a bad memory. And silence—except for the faint creak of
        ancient books shifting on their shelves.

        The floor near the ritual circle shows fresh scuff marks. Someone was
        here recently. Someone who left in a hurry.

      surface_elements:
        - "Reading desk with scattered parchments and an ancient tome open to cramped handwriting"
        - "Circle of melted candles on the floor, ritual space cleared"
        - "Scattered dried herbs near the candle circle—pungent, unfamiliar smell"
        - "Frost-covered window with unnatural patterns radiating from floor"
        - "Snape's body, arm reaching toward the ritual circle, expression of concern"
        - "Faint scuff marks leading toward the exit"
        - "A dark green fiber caught on the doorframe, slightly singed"
        - "Clear sight line from reading desk to main entrance—and to the exit"
        - "Towering shelves block view of eastern alcove—someone could research there unseen"

      witnesses_present: ["hermione"]

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "specialis_revelio"
          - "lumos"
          - "prior_incantato"
        special_interactions:
          revelio:
            targets:
              - "desk"
              - "floor"
              - "papers"
              - "ritual circle"
              - "doorframe"
            reveals_evidence:
              - "dropped_badge"
              - "hidden_note"
              - "ritual_book"
              - "singed_cloak_fiber"
          prior_incantato:
            targets:
              - "snape's wand"
              - "wand"
              - "victim's wand"
            reveals_evidence:
              - "wand_signature"
          specialis_revelio:
            targets:
              - "frost"
              - "window"
              - "floor"
              - "cursed object"
              - "ritual circle"
              - "fiber"
            reveals_evidence:
              - "frost_pattern"
          lumos:
            targets:
              - "floor"
              - "exit"
              - "scuff marks"
              - "footprints"
              - "doorframe"
            reveals_evidence:
              - "muddy_footprints"
              - "singed_cloak_fiber"

      hidden_evidence:
        # Dobby's apology note - initial red herring
        - id: "hidden_note"
          name: "Crumpled Apology Note"
          location_found: "library"
          type: "documentary"
          discovery_guidance: "Revealed when player searches the reading desk, examines papers, or uses Revelio on the desk area."
          description: |
            A small, crumpled note written in shaky, childlike handwriting:

            "Master Professor, Dobby is sorry. Dobby needed hellebore for sick friend.
            Dobby will return it. Please don't tell. —D."

            The date is from three days ago. The handwriting is crude, almost desperate.
            But wait—hellebore was stolen AGAIN yesterday. This note only explains the
            first theft. Who took the second batch?

            And there's another troubling detail: house-elves report seeing Dobby
            near the Restricted Section corridor TONIGHT, around the time of the
            attack. He claims he was checking on a sick friend in the hospital
            wing—but that's very close to the crime scene. Coincidence?
          tag: "[EVIDENCE: hidden_note]"
          significance: "Reveals Dobby stole ingredients first—but 'D.' creates ambiguity with Draco. Dobby was also near the scene tonight."
          strength: 65
          points_to: ["dobby", "draco"]
          contradicts: []

        # Snape's wand - proves he wasn't dueling
        - id: "wand_signature"
          name: "Snape's Wand Signature"
          location_found: "library"
          type: "magical"
          discovery_guidance: "Revealed when player casts Prior Incantato on Snape's wand or examines the wand magically."
          description: |
            Prior Incantato reveals Snape's wand activity:

            Last spell: "Finite Incantatem" (attempted cancellation)
            Cast: Moments before petrification
            Before that: "Lumos" (1 hour prior)

            He was trying to STOP the ritual, not attack anyone. No offensive spells.
            No defensive spells. He walked into danger trying to safely disarm
            something—and paid the price.
          tag: "[EVIDENCE: wand_signature]"
          significance: "Proves Snape was attempting to stop the ritual, not duel. He was trying to help."
          strength: 95
          points_to: []
          contradicts: ["duel_theory", "snape_attacked_first", "snape_confronting"]

        # Hand of Glory signature - the weapon
        - id: "frost_pattern"
          name: "Hand of Glory Discharge"
          location_found: "library"
          type: "magical"
          discovery_guidance: "Revealed when player examines the frost patterns, window, or floor near the ritual circle. Specialis Revelio confirms the dark magic signature."
          description: |
            The frost radiates from the center of the ritual circle, spreading outward
            in a starburst pattern. Using Specialis Revelio, you detect residual dark
            magic—the unmistakable signature of a Hand of Glory.

            The discharge pattern suggests the artifact was mid-activation when
            interrupted. Someone tried to stop the ritual, and the unstable magic
            exploded outward. The Hand of Glory itself is gone—taken by whoever fled.

            This level of dark magic requires a genuine cursed artifact. Not something
            a student could fake or a house-elf could produce.
          tag: "[EVIDENCE: frost_pattern]"
          significance: "The weapon—a Hand of Glory that discharged during interrupted ritual. Requires wizard-level magic."
          strength: 100
          points_to: ["draco"]
          contradicts: ["accident_theory", "dobby_guilty", "hermione_guilty"]

        # Hermione's badge - places her at scene
        - id: "dropped_badge"
          name: "Hermione's Library Badge"
          location_found: "library"
          type: "physical"
          discovery_guidance: "Revealed when player searches the floor near Snape's body, examines the ground, or uses Revelio on the scene."
          description: |
            A Gryffindor library access badge near Snape's body. The name engraved:
            "Hermione Granger." Students need these badges for after-hours Restricted
            Section access.

            Why was hers here? Did she drop it when she found him... or was she here
            when it happened? Given what happened between her and Snape that afternoon,
            her presence raises questions.
          tag: "[EVIDENCE: dropped_badge]"
          significance: "Places Hermione at the scene—combined with her motive, creates serious suspicion"
          strength: 70
          points_to: ["hermione"]
          contradicts: []

        # Footprints toward Slytherin
        - id: "muddy_footprints"
          name: "Scuff Marks and Footprints"
          location_found: "library"
          type: "physical"
          discovery_guidance: "Revealed when player examines the floor, looks for tracks, investigates the exit path, or uses Lumos to illuminate the scuff marks."
          description: |
            Faint scuff marks on the polished stone floor lead from the ritual circle
            toward the exit. Under Lumos, they continue down the corridor in the
            direction of the dungeons—toward the Slytherin common room.

            The stride length suggests someone running. The shoe size is too large
            for Hermione, too human-shaped for a house-elf. Someone fled toward
            Slytherin territory in a hurry.
          tag: "[EVIDENCE: muddy_footprints]"
          significance: "Whoever fled went toward Slytherin. Shoe size eliminates Hermione and Dobby."
          strength: 80
          points_to: ["draco"]
          contradicts: ["hermione_guilty", "dobby_guilty"]

        # Singed cloak fiber - near miss evidence
        - id: "singed_cloak_fiber"
          name: "Singed Cloak Fiber"
          location_found: "library"
          type: "physical"
          discovery_guidance: "Revealed when player examines the doorframe, investigates the exit, or looks for trace evidence."
          description: |
            A single fiber from an expensive cloak, caught on the doorframe near
            the exit. The fiber is singed—as if exposed to magical discharge.

            The color is dark green, possibly Slytherin. The weave suggests
            expensive fabric, not standard student robes. Someone wealthy,
            wearing green, fled through this door in a hurry.

            But green is a common color. Slytherin students, professors with
            green robes, even some Ravenclaws wear dark green. Not conclusive
            alone—but it narrows the field.
          tag: "[EVIDENCE: singed_cloak_fiber]"
          significance: "Suggests culprit wore expensive Slytherin-colored clothing. Partial evidence."
          strength: 45
          points_to: ["draco"]
          contradicts: []

        # Ritual book - proves premeditation
        - id: "ritual_book"
          name: "Dark Artifact Activation Manual"
          location_found: "library"
          type: "documentary"
          discovery_guidance: "Revealed when player examines the reading desk, investigates the open book, or uses Revelio on the desk area."
          description: |
            The book on the reading desk is open to a chapter titled:
            "Hand of Glory: Activation Rite"

            The instructions require: a circle of seven candles, fresh hellebore,
            and recitation of an incantation at midnight. A note in the margin
            (elegant handwriting, expensive ink): "Use the hellebore from Father's
            package. Don't let Snape catch you—he'll recognize it."

            Someone was following these instructions. Someone who received a package
            from their father. Someone worried about Snape specifically.
          tag: "[EVIDENCE: ritual_book]"
          significance: "Proves premeditated ritual. Marginal notes point to someone with wealthy father who fears Snape."
          strength: 90
          points_to: ["draco"]
          contradicts: ["accident_theory"]

      not_present:
        - triggers:
            - "secret passage"
            - "hidden door"
            - "escape route"
          response: "The walls are solid stone. No hidden passages here—just shelves and books."
        - triggers:
            - "hand of glory"
            - "the artifact"
            - "cursed object"
          response: "The Hand of Glory is gone. Whoever fled took it with them."

    # =========================================================================
    # Location 2: Slytherin Common Room
    # =========================================================================
    slytherin_common_room:
      id: "slytherin_common_room"
      name: "Slytherin Common Room"
      type: "micro"

      description: |
        Professor McGonagall's authorization spell tingles at your wrist—
        temporary access for the investigation. The stone wall slides open.
        You're not welcome here. Every surface reminds you.

        The Slytherin common room stretches beneath the Black Lake. Green-tinted
        light filters through windows looking into murky water—occasionally a
        shadow passes, something large and old. Leather armchairs surround a
        dying fireplace. The room is quiet. Most students in bed. The few who
        remain watch you with cold curiosity.

        Draco Malfoy's corner is unmistakable—the most expensive armchair, worn
        from habitual use, positioned to see everyone who enters. His trunk sits
        nearby, closed, silver "DM" monogram catching the green light. A writing
        desk holds mundane correspondence. But the real secrets aren't on display.

        The smell of something herbal lingers near the trunk. Faint. Familiar.

      surface_elements:
        - "Green-tinted lake windows casting eerie light—shadows pass occasionally"
        - "Leather armchairs near dying fireplace, one worn more than others"
        - "Writing desk with mundane correspondence—nothing unusual visible"
        - "Draco Malfoy's trunk in the corner, closed, silver 'DM' monogram"
        - "Faint smell of something herbal near the trunk area"
        - "Draco's armchair positioned to see anyone entering—territorial, watchful"
        - "A few students still awake, watching you with cold Slytherin curiosity"

      witnesses_present: []

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "lumos"
          - "specialis_revelio"
        special_interactions:
          revelio:
            targets:
              - "trunk"
              - "draco's trunk"
              - "draco's belongings"
              - "malfoy's things"
            reveals_evidence:
              - "torn_letter"
              - "stolen_hellebore"
          specialis_revelio:
            targets:
              - "trunk"
              - "draco's things"
              - "robes"
            reveals_evidence:
              - "residual_dark_magic"

      hidden_evidence:
        # Lucius's letter - connects Hand of Glory to Draco
        - id: "torn_letter"
          name: "Letter from Lucius Malfoy"
          location_found: "slytherin_common_room"
          type: "documentary"
          discovery_guidance: "Revealed when player searches Draco's trunk thoroughly, uses Revelio on the trunk, or specifically investigates Draco's belongings after finding other evidence pointing to him."
          description: |
            Hidden beneath Draco's robes in his trunk—a letter on expensive
            parchment, partially burned at the edges as if someone tried to
            destroy it but stopped. The Malfoy family crest is still visible:

            "Draco,

            The package has arrived. A genuine Hand of Glory—one of three known to
            exist. Your grandfather used it during the first war. Now it's yours.

            The activation ritual is in 'Rites of Activation' in the Restricted
            Section. You'll need fresh hellebore. I've included some, but if you
            need more, Snape keeps stores in his office. Be careful—Severus will
            recognize the artifact. He knows what it can do.

            Make our family proud.
            —Father"

            The letter is dated four days ago. Draco tried to burn it after the
            attack—but couldn't bring himself to destroy his father's words entirely.
          tag: "[EVIDENCE: torn_letter]"
          significance: "Directly connects Draco to the Hand of Glory, the ritual, and foreknowledge that Snape would recognize it"
          strength: 95
          points_to: ["draco"]
          contradicts: ["dobby_guilty", "hermione_guilty"]

        # Stolen hellebore in Draco's trunk
        - id: "stolen_hellebore"
          name: "Stolen Hellebore"
          location_found: "slytherin_common_room"
          type: "physical"
          discovery_guidance: "Revealed when player searches Draco's trunk, investigates his belongings, or notices the herbal smell near his things."
          description: |
            Inside Draco's trunk, hidden beneath robes: a pouch of dried hellebore
            with "Snape's Private Stores" stamped on the fabric. The same type of
            hellebore scattered at the crime scene.

            This is from the SECOND theft—the one that happened yesterday, after
            Dobby's apology note. Draco needed more hellebore for the ritual than
            his father sent. He stole it from Snape.
          tag: "[EVIDENCE: stolen_hellebore]"
          significance: "Proves Draco committed the second theft. Connects him to ritual ingredients at crime scene."
          strength: 85
          points_to: ["draco"]
          contradicts: ["dobby_guilty"]

        # Dark magic residue on Draco's things
        - id: "residual_dark_magic"
          name: "Dark Magic Residue"
          location_found: "slytherin_common_room"
          type: "magical"
          discovery_guidance: "Revealed when player casts Specialis Revelio on Draco's trunk or belongings."
          description: |
            Specialis Revelio reveals traces of dark magic on Draco's trunk lining
            and robes. The signature matches the Hand of Glory discharge in the
            library. Whatever was stored here recently was saturated with the
            same cursed energy.

            The artifact was kept in this trunk. The person who wore these robes
            was present when it discharged.
          tag: "[EVIDENCE: residual_dark_magic]"
          significance: "Magical forensics proving the Hand of Glory was stored in Draco's trunk"
          strength: 90
          points_to: ["draco"]
          contradicts: ["draco_alibi"]

        # Student witness testimony
        - id: "student_testimony"
          name: "Slytherin Student Accounts"
          location_found: "slytherin_common_room"
          type: "testimonial"
          discovery_guidance: "Revealed when player questions Slytherin students, asks about that night, or investigates who was present in the common room."
          description: |
            Several Slytherin students report—though their stories don't quite align:

            "Draco left before curfew, maybe quarter to ten? Carrying something
            wrapped in cloth. Said he was 'going to study.' Nervous, but excited."

            "He came back not long after—before I went to bed, so maybe ten-ish?
            Completely different. White as a ghost, hands shaking."

            But Pansy Parkinson insists: "He was just carrying books. His father
            sends him rare books all the time. And he came back much later—I was
            almost asleep. You're all exaggerating."

            Another student contradicts her: "Pansy wasn't even in the common room
            when he left. She's covering for him. And it wasn't books—books don't
            make you come back looking like you've seen a Dementor."

            "When Pansy asked if he was okay, he snapped at her. Said something
            like 'It wasn't supposed to happen like that.' Then locked himself in."

            The timing is fuzzy—students don't watch clocks. But the terror on
            Draco's face when he returned? Everyone agrees on that.
          tag: "[EVIDENCE: student_testimony]"
          significance: "Eyewitnesses place Draco leaving with wrapped object, returning terrified. Minor contradictions about timing and what he carried—but unanimous about his fear."
          strength: 85
          points_to: ["draco"]
          contradicts: ["draco_alibi"]

      not_present:
        - triggers:
            - "hand of glory"
            - "the artifact"
            - "cursed object"
          response: "If the Hand of Glory was here, it's been hidden or disposed of. Draco wouldn't keep it somewhere obvious after what happened."

    # =========================================================================
    # Location 3: Third Floor Corridor (Witness location)
    # =========================================================================
    third_floor_corridor:
      id: "third_floor_corridor"
      name: "Third Floor Corridor"
      type: "micro"

      description: |
        The third floor corridor outside the library. Torches flicker in wall
        sconces, casting long shadows across worn flagstones. A window at the
        corridor's end offers a clear view of the grounds—and anyone approaching
        the castle.

        This is McGonagall's patrol route. You can tell by the slight wear in
        the stones, the precise spacing between torch sconces. She walks this
        path every night. From here, she can see the castle entrance, the
        library doors, and the stairway to the dungeons.

        A portrait of a dozing wizard hangs near the library entrance—potential
        witness, if he was awake. Several students passed through here that
        afternoon. Several saw things they probably wish they hadn't.

      surface_elements:
        - "Flickering torches in wall sconces, precisely spaced"
        - "Window overlooking moonlit grounds—clear view of castle entrance"
        - "Stone floor showing faint patrol wear patterns from years of McGonagall's rounds"
        - "Portrait of a dozing wizard near library entrance (potential witness)"
        - "Clear sight lines to library doors, dungeon stairs, and main corridor"
        - "Scuff marks near the wall where Snape cornered Hermione that afternoon"

      witnesses_present: ["mcgonagall"]

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "lumos"

      hidden_evidence:
        # Witness account of Snape-Hermione confrontation
        - id: "hallway_confrontation"
          name: "Witness Account: Afternoon Confrontation"
          location_found: "third_floor_corridor"
          type: "testimonial"
          discovery_guidance: "Revealed when player asks about earlier events, investigates what happened before the attack, or questions students about Hermione and Snape."
          description: |
            Multiple students witnessed an incident around 4 PM:

            "Snape cornered Granger right here. He was furious—said something about
            'unauthorized combat instruction' and 'immediate expulsion.' Granger
            looked terrified, then angry. She said 'You can't do this!' and ran off."

            "Snape called after her: 'Tomorrow morning, Miss Granger. The Headmaster
            will hear everything.' He had that smile—you know the one."

            "Granger was crying in the library afterward. She was there for hours."

            That evening, Snape was found frozen. And Granger was in the library...
          tag: "[EVIDENCE: hallway_confrontation]"
          significance: "Establishes Hermione had strong motive—Snape threatened to end her Hogwarts career"
          strength: 75
          points_to: ["hermione"]
          contradicts: []

      not_present:
        - triggers:
            - "blood"
            - "evidence of struggle"
          response: "No signs of violence here. Whatever happened, it happened in the Restricted Section."

    # =========================================================================
    # Location 4: Hogwarts Kitchens (Dobby's location)
    # =========================================================================
    kitchens:
      id: "kitchens"
      name: "Hogwarts Kitchens"
      type: "micro"

      description: |
        You tickle the pear. It giggles, squirms, and becomes a door handle.

        The vast Hogwarts kitchens stretch before you, directly below the Great
        Hall. Brass pots and pans hang from the ceiling, gleaming in the firelight
        of a dozen hearths. Four long tables mirror those in the hall above.
        House-elves bustle about even at this hour—they never truly rest.

        The elves glance at you with enormous eyes. Curious. Wary. Visitors are
        rare. Investigators rarer still.

        In the corner near the hospital wing corridor, you spot a small elf with
        tennis-ball-sized green eyes. Dobby. He sits beside a makeshift cot where
        another elf—Winky—rests under a patchwork blanket. Dobby's corner is
        neater than the others. Mismatched socks displayed proudly on a small
        shelf. Small touches of freedom, hard-won.

        He looks up as you approach. His ears droop. He knows why you're here.

      surface_elements:
        - "Brass cookware hanging from ceiling, gleaming in firelight"
        - "Four long preparation tables mirroring the Great Hall above"
        - "Busy house-elves working quietly—they never truly rest"
        - "Small cot in the corner with Winky resting under patchwork blanket"
        - "Dobby sitting beside his friend, ears drooping with anxiety"
        - "Fireplace crackling with magical blue flames"
        - "Dobby's corner: neater than most, mismatched socks displayed proudly"
        - "Other elves glancing at you with enormous, wary eyes"

      witnesses_present: ["dobby"]

      spell_contexts:
        available_spells:
          - "revelio"
          - "homenum_revelio"
          - "lumos"
        special_interactions:
          revelio:
            targets:
              - "dobby's belongings"
              - "corner"
              - "cot area"
            reveals_evidence:
              - "healing_supplies"

      hidden_evidence:
        - id: "healing_supplies"
          name: "Dobby's Healing Supplies"
          location_found: "kitchens"
          type: "physical"
          discovery_guidance: "Revealed when player examines Dobby's area, searches near Winky's cot, or uses Revelio on the corner."
          description: |
            Near Winky's cot: a small cauldron with the remnants of a healing
            potion, a mortar and pestle, and an empty pouch labeled "Hellebore -
            Snape's Private Stores."

            The potion residue is clearly medicinal—a standard restorative brew
            for magical exhaustion. The hellebore was used for healing, exactly
            as Dobby claimed. This matches the theft from three days ago.

            Notably, this is the ONLY stolen hellebore here. No second theft
            supplies. Whoever took the hellebore yesterday didn't bring it here.
          tag: "[EVIDENCE: healing_supplies]"
          significance: "Proves Dobby used the hellebore for healing, not dark magic. Only accounts for first theft."
          strength: 75
          points_to: []
          contradicts: ["dobby_guilty"]

      not_present:
        - triggers:
            - "dark artifact"
            - "hand of glory"
            - "ritual materials"
          response: "The kitchens are full of cooking supplies, not dark artifacts. House-elves have no use for such things."

  # ---------------------------------------------------------------------------
  # WITNESSES
  # ---------------------------------------------------------------------------
  witnesses:
    # =========================================================================
    # Witness 1: Hermione Granger (Strong Red Herring)
    # =========================================================================
    - id: "hermione"
      name: "Hermione Granger"
      personality: |
        Brilliant, rule-conscious, but fiercely loyal to friends. Speaks quickly
        when nervous, becomes defensive when accused. Currently terrified—not just
        of being blamed for Snape's attack, but of losing everything she's worked for.
        She knows how guilty she looks. She knows about the confrontation witnesses saw.
        Her only defense is the truth, but the truth incriminates her friend Neville.

      background: |
        Third-year Gryffindor, top of her class. Recently she's been teaching Neville
        Longbottom defensive spells after Slytherins—specifically Crabbe, Goyle, and
        occasionally Draco Malfoy himself—repeatedly hexed him in corridors. This is
        against school rules—students aren't allowed to teach combat magic. Snape
        caught Neville practicing, forced him to confess, and confronted Hermione
        that afternoon. He threatened to have them both expelled.

        That evening, she went to the Restricted Section to research precedents—cases
        where students were pardoned for similar rule violations. She was building a
        legal defense for the disciplinary hearing. Instead, she found Snape frozen.

        Hermione has no love for Draco Malfoy—his friends are the reason she started
        teaching Neville in the first place. But she won't accuse anyone without proof.

      wants: "Prove her innocence without getting Neville expelled for the lessons she taught him"
      fears: "Being expelled, being blamed for Snape's attack, Neville being punished because of her"
      moral_complexity: |
        Hermione looks guilty. She had motive (Snape threatened expulsion), opportunity
        (was in the Restricted Section), and witnesses saw her confrontation with Snape.
        Her wand even shows she practiced petrification spells that day.

        But she's innocent. The petrification spells were for Neville's lessons—Petrificus
        Totalus, not a Hand of Glory curse. She arrived after Snape was already frozen.
        She saw someone fleeing but couldn't identify them clearly.

        Now she faces an impossible choice: tell the whole truth and condemn Neville for
        the lessons, or withhold details and look even more suspicious. Her loyalty to
        her friend might cost her everything.

      base_trust: 55
      occlumency_skill: 0

      knowledge:
        - "I was in the Restricted Section around 10:05 PM researching legal precedents"
        - "I found Professor Snape already frozen near the window"
        - "I saw someone running away—a cloaked figure heading toward the dungeons"
        - "My library badge must have fallen when I discovered the body and panicked"
        - "Yes, Snape confronted me that afternoon. Everyone saw it. I'm sure that looks bad."

      secrets:
        - id: "teaching_neville"
          trigger: "trust>50"
          risk_type: "protective"
          risk_level: "high"
          why_hiding: "Admitting this confirms why Snape was threatening me—it's my motive"
          text: |
            I was teaching Neville defensive magic. The Slytherins have been hexing
            him for MONTHS and no one does anything! Professor Flitwick just says
            'boys will be boys.' Professor McGonagall says she'll 'look into it.'

            So I taught him to defend himself. Petrificus Totalus. Protego. Basic
            things that could save him from being cursed in corridors. Snape caught
            Neville practicing and forced him to tell who taught him.

            That's why Snape confronted me. That's why he threatened expulsion.
            But I didn't attack him! I was trying to SAVE my future, not destroy it!
          keywords:
            - "teaching neville"
            - "defensive magic lessons"
            - "slytherins hexing neville"
            - "petrificus protego"

        - id: "snape_threat_detail"
          trigger: "trust>60 OR evidence:hallway_confrontation"
          risk_type: "self_incriminating"
          risk_level: "high"
          why_hiding: "This is my motive—the more detail I give, the guiltier I look"
          text: |
            Snape said he was going to Dumbledore tomorrow morning. He said I'd be
            expelled by noon and Neville would be gone by dinner. He said our
            "dangerous little lessons" proved we were "unfit for Hogwarts."

            I was furious. I said things I shouldn't have. "You can't do this!"
            I might have said... I might have said I'd stop him somehow. I didn't
            MEAN it like that! I meant I'd find precedents, build a case, talk to
            Dumbledore myself!

            But I know how it sounds. I KNOW.
          keywords:
            - "expelled by noon"
            - "stop him somehow"
            - "dangerous lessons"
            - "dumbledore tomorrow morning"

        - id: "wand_evidence"
          trigger: "trust>55 OR evidence:hermione_wand_check"
          risk_type: "self_incriminating"
          risk_level: "medium"
          why_hiding: "My wand shows petrification magic—it looks incriminating even though it's innocent"
          text: |
            Yes, I cast Petrificus Totalus that day. Multiple times. I was TEACHING
            Neville, practicing with him in an empty classroom. That's why it shows
            on my wand signature.

            But Petrificus Totalus is completely different from a Hand of Glory curse!
            Check the magical signature—they're not even close! One is a simple
            body-bind, the other is ancient dark magic. I couldn't produce that
            curse even if I wanted to!
          keywords:
            - "petrificus totalus teaching"
            - "practicing with neville"
            - "different signature"

        - id: "saw_blonde_hair"
          trigger: "trust>70 OR evidence:muddy_footprints"
          risk_type: "protective"
          risk_level: "medium"
          why_hiding: "I don't want to accuse anyone without proof—I know what false accusations feel like now"
          text: |
            The person I saw running... I only caught a glimpse. A hooded cloak,
            expensive fabric. And blonde hair—pale blonde, almost white—caught
            the torchlight for just a moment before they disappeared toward the
            dungeons.

            I know who has hair like that. But I'm not going to accuse anyone
            without proof. I know what it's like to be accused based on
            circumstance. I won't do that to someone else.

            ...Even if I'm fairly certain.
          keywords:
            - "blonde hair pale"
            - "hooded expensive cloak"
            - "toward dungeons running"

      lies:
        - condition: "trust<40"
          topics:
            - "why were you there"
            - "what were you doing"
            - "restricted section"
          response: "I was researching. Advanced Transfiguration theory. Nothing unusual."

    # =========================================================================
    # Witness 2: Draco Malfoy (The Culprit)
    # =========================================================================
    - id: "draco"
      name: "Draco Malfoy"
      personality: |
        Arrogant exterior hiding genuine terror. Son of Lucius Malfoy, crushed by
        pressure to uphold family legacy. When cornered, he oscillates between
        defiant sneering and complete breakdown. Currently experiencing the worst
        night of his life—he didn't mean to hurt anyone, but he did. He's not evil.
        He's a scared teenager who made a catastrophic mistake and doesn't know
        how to face the consequences.

      background: |
        Third-year Slytherin, pure-blood aristocrat. His father sent him a Hand of
        Glory—a family heirloom from the first wizarding war—with instructions to
        activate it using a ritual from the Restricted Section. Lucius wanted Draco
        to "prove himself" by mastering a dark artifact.

        Draco stole hellebore from Snape's stores to complete the ritual (after
        Lucius's supply ran out). He snuck to the Restricted Section to perform
        the activation in private. Snape caught him mid-ritual and tried to safely
        interrupt the process. The interruption caused the artifact to discharge
        its curse. Draco fled in panic.

        He never meant to hurt Snape. He never meant to hurt anyone. But intent
        doesn't erase consequence.

      wants: "Avoid expulsion, Azkaban, and above all—his father's disappointment"
      fears: "His father finding out he failed, being sent to Azkaban, destroying the Malfoy name"
      moral_complexity: |
        Draco is guilty, but he's not a monster. He's a teenager who wanted to
        impress his father, made a reckless decision, and watched it spiral into
        disaster. He didn't attack Snape—he was activating the artifact when Snape
        tried to stop him, and the interruption caused the discharge.

        Worse: Snape was trying to PROTECT him. Snape knew the artifact was
        dangerous and was attempting to safely shut down the ritual. Draco pulled
        away, the magic destabilized, and Snape paid the price for trying to help.

        Now Draco faces an impossible choice: confess and destroy his future (and
        face his father's wrath), or stay silent and let an innocent person—
        Hermione, who already looks guilty—take the blame. He's not brave enough
        to confess. But he's not evil enough to be comfortable with the alternative.

      base_trust: 25
      occlumency_skill: 45

      knowledge:
        - "I was in the Slytherin common room all evening, studying"
        - "My father sends me letters sometimes. Family correspondence. Private."
        - "I don't know anything about Professor Snape's... situation"
        - "Granger probably did it. She had that fight with Snape—everyone saw it"
        - "Granger's been sneaking around with Longbottom for weeks. Teaching him spells because he's too pathetic to handle a few harmless hexes from my friends. That's probably why Snape was angry at her."

      secrets:
        - id: "received_hand_of_glory"
          trigger: "trust>45 OR evidence:torn_letter"
          risk_type: "self_incriminating"
          risk_level: "medium"
          why_hiding: "Admitting I have a dark artifact is the first step toward expulsion"
          text: |
            Fine. Father sent me a Hand of Glory. It's a family heirloom—my
            grandfather used it in the war. It's not ILLEGAL to own one. It's
            just... regulated.

            Father wanted me to learn how to use it. Prove I'm worthy of the
            Malfoy legacy. That's all. It's a family tradition.
          keywords:
            - "hand of glory father"
            - "family heirloom grandfather"
            - "malfoy legacy tradition"

        - id: "stole_hellebore"
          trigger: "trust>55 OR evidence:stolen_hellebore"
          risk_type: "self_incriminating"
          risk_level: "high"
          why_hiding: "This connects me to Snape and the crime scene"
          text: |
            I... Father's hellebore wasn't enough for the ritual. The instructions
            said I needed more. So I took some from Snape's stores. Just a little.
            I was going to replace it!

            That's why Snape was so angry lately—he knew someone was stealing from
            him. But he thought it was that house-elf. I let him think that.
          keywords:
            - "took hellebore snape"
            - "stole ingredients stores"
            - "needed more ritual"

        - id: "was_performing_ritual"
          trigger: "trust>65 OR evidence:ritual_book"
          risk_type: "self_incriminating"
          risk_level: "high"
          why_hiding: "This places me at the scene doing exactly what caused the accident"
          text: |
            I was in the Restricted Section. I was performing the activation ritual.
            It was supposed to be simple—candles, hellebore, the incantation. The
            book said it would take ten minutes.

            I didn't know Snape would find me. I didn't know he'd try to stop it.
          keywords:
            - "performing activation ritual"
            - "restricted section candles"
            - "incantation ten minutes"

        - id: "snape_tried_to_help"
          trigger: "trust>75 OR (evidence:wand_signature AND evidence:frost_pattern)"
          risk_type: "self_incriminating"
          risk_level: "high"
          why_hiding: "This is a full confession—this means expulsion or worse"
          text: |
            Snape... he wasn't trying to punish me. I thought he would be angry,
            take points, give me detention. But when he saw the Hand of Glory
            mid-activation, he looked SCARED. For me.

            He said "Stop, you fool—you'll kill yourself!" He tried to cast
            something—Finite Incantatem, I think—to safely shut down the ritual.
            But I panicked. I pulled the Hand of Glory away. The magic was already
            unstable and when I moved it...

            *voice breaks*

            It wasn't supposed to hit HIM. It was supposed to be MY ritual. He was
            trying to SAVE me and I... I got him frozen instead. Then I ran.
            I ran and I left him there and I...

            I didn't mean for any of this to happen. I swear I didn't.
          keywords:
            - "snape scared for me"
            - "save me ritual"
            - "pulled away discharged"
            - "ran left him there"

      lies:
        - condition: "trust<45"
          topics:
            - "where were you"
            - "that night"
            - "restricted section"
          response: "I was in the common room. Ask anyone. Granger did it—she had the fight with Snape."

        - condition: "trust<55"
          topics:
            - "your father's letter"
            - "package"
            - "lucius"
          response: "My father's correspondence is private family business. It's not your concern."

        - condition: "trust<60"
          topics:
            - "hand of glory"
            - "dark artifact"
          response: "I don't know what you're talking about. You're obviously confused."

    # =========================================================================
    # Witness 3: Professor McGonagall (Authority Figure)
    # =========================================================================
    - id: "mcgonagall"
      name: "Professor Minerva McGonagall"
      personality: |
        Stern, fair, deeply principled. Deputy Headmistress and Head of Gryffindor.
        Speaks precisely, weighs every word. Currently troubled—she sees this case
        as a tragedy of multiple failures. Snape's harshness drove students to
        secrecy. Draco's upbringing led him to dangerous experimentation. Hermione's
        loyalty led her to break rules. No one is wholly innocent; no one is purely
        evil.

      background: |
        McGonagall was on patrol the night of the attack. She witnessed Draco
        returning to the castle around 10:15 PM, looking terrified. She also
        knows about the Snape-Hermione confrontation (she was planning to mediate
        the next morning). And she knows Dobby confessed to the first ingredient
        theft after the attack—a completely separate incident.

        She wants justice served, but she also understands that multiple people
        made mistakes leading to this tragedy. She won't lie, but she won't
        volunteer information that might destroy young lives unnecessarily.

      wants: "See justice done while understanding how multiple failures led to tragedy"
      fears: "An innocent student ruined, a guilty student escaping, the truth being more complicated than anyone wants"
      moral_complexity: |
        McGonagall knows Draco is likely guilty—she saw him returning, terrified,
        at the right time. But she also knows Hermione looks guilty, and that
        Hermione was only breaking rules to help a bullied student. And she knows
        Snape's harsh approach to the situation made everything worse.

        She believes in justice, but she also believes in understanding. She'll
        tell the truth, but she wants the investigator to understand that this
        isn't a simple story of villain and victim. Everyone made choices that
        led here. The question is: what do we do now?

      base_trust: 70
      occlumency_skill: 75

      knowledge:
        - "Severus reported ingredient theft three days ago—hellebore and moonstone. A house-elf was suspected."
        - "There was a SECOND theft yesterday. Different handwriting on the note—or no note at all. Severus was furious."
        - "I witnessed the confrontation between Severus and Miss Granger. It was... harsh, even by his standards."
        - "I was on patrol that evening. I saw a student returning to the castle around 10:15 PM, acting furtive."
        - "Miss Granger has been an exemplary student. Whatever she was doing in the Restricted Section, I doubt it was malicious."
        - "If you need to speak with Dobby, he works in the kitchens. Below the Great Hall—tickle the pear in the fruit bowl painting to enter."

      secrets:
        - id: "saw_draco_return"
          trigger: "trust>70 OR evidence:muddy_footprints"
          risk_type: "protective"
          risk_level: "high"
          why_hiding: "Accusing a Malfoy without absolute certainty has political consequences—and could destroy a young life if I'm wrong"
          text: |
            The student I saw returning... it was Draco Malfoy. I didn't see his
            face clearly at first, but that platinum hair caught the moonlight.
            He was hurrying toward the dungeons, almost running, and he looked
            absolutely terrified.

            When I called out, he pretended not to hear me. Disappeared into the
            Slytherin entrance before I could reach him. At the time, I thought
            he was simply out past curfew. Now I wonder if it was something worse.
          keywords:
            - "draco malfoy returning"
            - "platinum hair moonlight"
            - "terrified toward dungeons"
            - "slytherin entrance called"

        - id: "dobby_confession"
          trigger: "trust>75 OR evidence:hidden_note"
          risk_type: "protective"
          risk_level: "high"
          why_hiding: "House-elves have no legal protection—Dobby could be severely punished by his masters if this becomes official"
          text: |
            After the attack, Dobby came to me in tears. He confessed to stealing
            the first batch of hellebore—he needed it to brew a healing potion
            for Winky, another house-elf who was ill. That's what his note was about.

            Poor Winky had been secretly mending young Mr. Longbottom's robes after
            those... incidents with certain Slytherin students. The stress and extra
            work made her sick. Dobby was trying to help his friend.

            But Dobby swears he had nothing to do with the attack, and I believe
            him. House-elf magic doesn't work that way—they can't channel cursed
            objects like a Hand of Glory. And besides, his theft was three days
            before the attack. The second theft—the one Severus was truly angry
            about—wasn't Dobby at all.

            Someone else stole the hellebore yesterday. Someone who needed it for
            something more sinister than healing a sick friend.
          keywords:
            - "dobby confessed hellebore"
            - "healing potion winky"
            - "winky helping neville"
            - "second theft yesterday"
            - "someone else stole"

        - id: "snape_knew_about_artifact"
          trigger: "trust>80 OR (evidence:torn_letter AND evidence:wand_signature)"
          risk_type: "emotional"
          risk_level: "medium"
          why_hiding: "This reveals Severus's complicated past and his genuine care for students—even the difficult ones"
          text: |
            Severus... he knew dark artifacts better than anyone. Old connections
            from his past—connections he'd rather forget. When he heard about
            ingredient theft, he suspected someone was attempting a ritual.

            He told me he was worried about Draco specifically. Said Lucius had
            been "posturing about family heirlooms" and he feared the boy would
            "do something foolish to impress his father."

            I think Severus went to the Restricted Section not to catch Draco,
            but to stop him from hurting himself. His wand signature—Finite
            Incantatem—that's a cancellation spell. He was trying to safely
            shut down whatever ritual Draco had started.

            He was trying to protect a student. And it cost him everything.
          keywords:
            - "severus worried draco"
            - "protect student ritual"
            - "trying to stop safely"
            - "cost him everything"

      lies: []

    # =========================================================================
    # Witness 4: Dobby (Red Herring - Now Interrogatable)
    # =========================================================================
    - id: "dobby"
      name: "Dobby"
      personality: |
        Speaks in third person, wringing hands constantly. Fiercely loyal but
        deeply conflicted—torn between his instinct to protect "young masters"
        (even bad ones) and his growing moral conscience. Prone to self-punishment
        when he feels he's done wrong. Desperately wants to help but terrified of
        getting others in trouble. His fear of the Malfoy family runs deep, even
        now that he's technically free.

        When nervous: speaks faster, eyes dart around, ears droop.
        When lying: physically pained, may hit himself.
        When telling truth about something difficult: whispers, looks at floor.

      background: |
        Dobby is a free house-elf working at Hogwarts. Three days ago, he stole
        hellebore from Professor Snape's stores—not for any dark purpose, but to
        brew a healing potion for his friend Winky. Winky had been secretly helping
        Neville Longbottom repair his robes after Slytherin students hexed him, and
        the extra stress made her ill.

        Dobby left an apology note signed "D." intending to return the ingredients.
        He had nothing to do with the attack on Snape—house-elf magic cannot channel
        dark wizard artifacts like the Hand of Glory.

        But Dobby saw something that night. He saw "young master Draco" sneaking
        through the corridors with something wrapped in cloth. And Dobby is terrified
        to say anything, because even free, he fears the Malfoy family.

      wants: "Prove he didn't hurt Professor Snape and protect his friend Winky from punishment"
      fears: "The Malfoy family, being punished, getting Winky in trouble, being blamed for something he didn't do"
      moral_complexity: |
        Dobby is caught between worlds. He's free now, but years of servitude to
        the Malfoys left deep scars. He knows Draco Malfoy was sneaking around that
        night. He knows "young master" was carrying something. But the thought of
        accusing a Malfoy fills him with visceral terror.

        At the same time, Dobby knows an innocent person might be blamed. He knows
        Hermione Granger was kind to him once. He knows what it's like to be accused
        of things you didn't do.

        His conscience says speak. His fear says stay silent. Which will win?

      base_trust: 40
      occlumency_skill: 0

      knowledge:
        - "Dobby is a free elf! Dobby works at Hogwarts now, helping in the kitchens."
        - "Dobby... Dobby did take the hellebore. Three days ago. Dobby is very sorry!"
        - "Dobby needed it for Winky. Winky was sick. Dobby was only trying to help his friend!"
        - "Dobby did NOT hurt Professor Snape! Dobby would never! Dobby's magic cannot even DO such things!"
        - "House-elf magic is different. Dobby cannot use wizard artifacts. It is not possible."

      secrets:
        - id: "winky_helped_neville"
          trigger: "trust>45"
          risk_type: "protective"
          risk_level: "medium"
          why_hiding: "Winky could get in trouble for helping a student without permission"
          text: |
            *wringing hands*

            Winky... Winky was helping the Longbottom boy. Young master Neville.
            Bad students kept hexing him, tearing his robes, ruining his things.
            Winky felt sorry for him. She would fix his robes at night, when no
            one was looking.

            But it was too much work on top of her regular duties. Winky got sick.
            Dobby only wanted to help his friend get better! That is why Dobby
            took the hellebore. For a healing potion. Nothing dark!
          keywords:
            - "winky helping neville"
            - "fixing robes hexing"
            - "healing potion friend"

        - id: "saw_draco_sneaking"
          trigger: "trust>55 OR evidence:student_testimony"
          risk_type: "protective"
          risk_level: "high"
          why_hiding: "Dobby is terrified of the Malfoy family—even now that he's free"
          text: |
            *ears flatten, voice drops to whisper*

            Dobby... Dobby saw something. That night. Dobby was in the corridors,
            checking on Winky in the hospital wing.

            Dobby saw... young master Draco. The Malfoy boy. He was sneaking toward
            the library. Carrying something wrapped in cloth. He looked... excited.
            Nervous. Like he was doing something secret.

            *trembling*

            Dobby should not be saying this. The Malfoys... even free, Dobby fears
            them. Old Master Lucius was very cruel. Young master Draco is... Dobby
            does not want to speak ill of the family. Please.
          keywords:
            - "saw draco sneaking"
            - "malfoy boy library"
            - "wrapped cloth something"
            - "fears malfoys"

        - id: "draco_returned_terrified"
          trigger: "trust>70 OR evidence:muddy_footprints"
          risk_type: "protective"
          risk_level: "high"
          why_hiding: "This is direct evidence against a Malfoy—Dobby fears retribution"
          text: |
            *covering ears, rocking slightly*

            Dobby saw young master Draco again. Later. Coming back from the library
            direction. But he was different. Running. White as a ghost. Shaking.

            He looked like he had seen something terrible. Or... or done something
            terrible. Dobby does not know which.

            *very quietly*

            Dobby thinks... Dobby thinks young master Draco did something bad. But
            Dobby is scared to say. The Malfoys have long memories. Even free, Dobby
            is not safe from them. Not really.

            But... but Miss Granger was kind to Dobby once. And if she is blamed
            for something she did not do... Dobby knows what that is like. Dobby
            knows.
          keywords:
            - "draco returned running"
            - "white ghost shaking"
            - "did something terrible"
            - "granger kind blamed"

        - id: "second_theft_not_dobby"
          trigger: "trust>50 OR evidence:stolen_hellebore"
          risk_type: "self_incriminating"
          risk_level: "medium"
          why_hiding: "Admitting knowledge of the second theft raises questions about what else Dobby knows"
          text: |
            Dobby only stole ONCE! Three days ago! Dobby left a note to apologize!

            But Professor Snape's stores were robbed AGAIN. Yesterday. Dobby did
            not do that! Dobby was with Winky all day yesterday—Winky can tell you!

            Someone else took ingredients yesterday. Someone who did NOT leave an
            apology note. Someone who was not sorry at all.

            *glances around nervously*

            Dobby... Dobby might know who. But Dobby is afraid to say.
          keywords:
            - "only stole once"
            - "second theft not dobby"
            - "someone else yesterday"
            - "afraid to say who"

      lies:
        - condition: "trust<35"
          topics:
            - "draco"
            - "malfoy"
            - "did you see anyone"
          response: |
            *ears twitch, hands wring faster*
            Dobby... Dobby did not see anything. Dobby was in the kitchens all night.
            Dobby does not know anything about young mas— about anyone!

        - condition: "trust<50"
          topics:
            - "who stole the ingredients"
            - "second theft"
          response: |
            *hitting himself on the head*
            Dobby does not know! Dobby only knows about Dobby's theft! Dobby is a
            good elf! Dobby does not spy on— Dobby means, Dobby does not know!

