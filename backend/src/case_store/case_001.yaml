      hidden_evidence:
        - id: "healing_supplies"
          name: "Dobby's Healing Supplies"
          location_found: "kitchens"
          type: "physical"
          discovery_guidance: "Revealed when player examines Dobby's area, searches near Winky's cot, or uses Revelio on the corner."
          description: |
            Near Winky's cot: a small cauldron with the remnants of a healing
            potion, a mortar and pestle, and an empty pouch labeled "Hellebore —
            Snape's Private Stores."

            The potion residue is clearly medicinal — a standard restorative
            brew. The hellebore was used for healing, exactly as Dobby claimed.

            This is the ONLY stolen hellebore here. No second theft supplies.
          tag: "[EVIDENCE: healing_supplies]"
          significance: "Confirms Dobby used the hellebore for healing. Only accounts for the first theft."
          strength: 60
          points_to: []
          witness_reactions:
            hermione: "This proves Dobby's theft was for medicine. But it also proves the second theft wasn't him — someone else needed hellebore for something else."
            draco: "So the elf stole for medicine. That doesn't clear him of anything else."
            mcgonagall: "This confirms what Dobby told me. His theft was innocent. The second theft is the one connected to the attack."
            dobby: "See! Dobby used it for Winky! Dobby is not a bad elf! *relief, but still anxious about something else*"

        # NEW: Kitchen log showing Dobby's absence
        - id: "kitchen_log"
          name: "Kitchen Duty Log"
          location_found: "kitchens"
          type: "documentary"
          discovery_guidance: "Revealed when player examines the kitchen log, asks about Dobby's whereabouts, or uses Revelio on the log book."
          description: |
            The kitchen duty log tracks house-elf movements for accountability.
            Tonight's entries for Dobby:

            "Dobby — kitchen duty: 8:00 PM - 9:58 PM"
            "Dobby — departed: 9:58 PM (personal errand)"
            "Dobby — returned: 10:09 PM"

            An eleven-minute absence. The attack on Snape happened at 10:02 PM.
            Dobby left two minutes before and returned seven minutes after.
          tag: "[EVIDENCE: kitchen_log]"
          significance: "Dobby was absent from the kitchens during the exact window of the attack. Where was he?"
          strength: 90
          points_to: ["dobby"]
          witness_reactions:
            hermione: "He left at 9:58 and came back at 10:09? The attack was at 10:02. That's... *looks at Dobby with dawning horror*"
            draco: "So the elf wasn't in the kitchens? Where was he then? *doesn't connect the dots yet*"
            mcgonagall: "Eleven minutes. The timeline is... concerning. Dobby, where exactly did you go during that time?"
            dobby: "*ears flatten completely* Dobby was... Dobby was checking on young master Draco's rooms. Making sure everything was clean. *the Slytherin dormitory is in the wrong direction from the library*"

        # NEW: Dobby's frostbitten hands
        - id: "dobby_frostbite"
          name: "Dobby's Frostbitten Hands"
          location_found: "kitchens"
          type: "physical"
          discovery_guidance: "Revealed when player examines Dobby's bandaged hands, casts Specialis Revelio on them, or asks about the bandages."
          description: |
            Beneath the cloth bandages, Dobby's knuckles and fingertips show
            frostbite damage — blistered, discolored skin consistent with
            extreme cold exposure.

            Specialis Revelio on the frostbite reveals traces of two magical
            signatures: the same blue-white cold from the crime scene frost,
            and a yellowish-green shimmer — house-elf magic.

            Dobby's hands were exposed to both the artifact's cold discharge
            AND his own magic at very close range.
          tag: "[EVIDENCE: dobby_frostbite]"
          significance: "Physical proof that Dobby was in close proximity to both the artifact discharge and house-elf magic — simultaneously."
          strength: 95
          points_to: ["dobby"]
          witness_reactions:
            hermione: "Frostbite with BOTH signatures? He was right there when it happened. Right there. And he used his own magic at the same time. *voice shaking* Oh no."
            draco: "The elf has frostbite? From the cold? But that means he was... *slowly understanding* He was THERE?"
            mcgonagall: "*very quietly* The dual signature on his hands matches the dual signature on Severus. Dobby... what did you do?"
            dobby: "*covers hands, begins rocking* Dobby is a bad elf. Dobby is a very bad elf. But Dobby had to... Master said... *breaks down*"

        # ATMOSPHERIC: House-elf working conditions — world-building for elf subplot
        - id: "elf_duty_roster"
          name: "House-Elf Duty Roster"
          location_found: "kitchens"
          type: "documentary"
          discovery_guidance: "Revealed when player examines the kitchen notice board, asks about house-elf schedules, or investigates working conditions."
          description: |
            A duty roster pinned near the kitchen entrance, written in a
            large, careful hand (likely a senior house-elf):

            "KITCHEN DUTIES — This Week:
            Breakfast prep: 4:00 AM — Winky, Tibby, Nob
            Lunch service: All hands
            Dinner service: All hands
            Night cleaning: Dobby (volunteered), Kreacher (assigned)
            Laundry: Rotating — see Headcount

            HEADCOUNT NOTE: Winky still recovering. Dobby covering her shifts plus his own. Management reminds: house-elves do not require rest periods. House-elves do not require days off. House-elves serve.

            DOBBY'S ANNOTATION (in shaky handwriting at the bottom):
            'Winky DOES need rest. Dobby will work extra.'"

            The annotation is touching — and telling. Dobby cares about his fellow elves in a way the system doesn't allow for.
          tag: "[EVIDENCE: elf_duty_roster]"
          significance: "Shows house-elf working conditions and Dobby's compassion. He's overworked, caring for Winky, AND following Lucius's orders. World-building for the elf subplot."
          strength: 10
          points_to: []
          witness_reactions:
            hermione: "They don't require REST PERIODS? They don't require DAYS OFF? This is... this is slavery. That's exactly what it is. *genuinely angry*"
            draco: "House-elves don't need rest. They like working. Father says they're happiest when they're useful."
            mcgonagall: "The house-elf system is... complex. I'm not comfortable with it, but it's deeply embedded in wizarding tradition. Dobby's note, though — that shows something unusual. Compassion between elves."
            dobby: "Dobby just wants Winky to feel better. The other elves say Dobby is strange for caring. But Dobby cannot help it."

      not_present:
        - triggers:
            - "dark artifact"
            - "hand of glory"
            - "ritual materials"
          response: "The kitchens are full of cooking supplies, not dark artifacts. House-elves have no use for such things."

  # ---------------------------------------------------------------------------
  # WITNESSES
  # ---------------------------------------------------------------------------
  witnesses:
    # =========================================================================
    # Witness 1: Hermione Granger (Red Herring — looks guilty early)
    # =========================================================================
    - id: "hermione"
      name: "Hermione Granger"
      description: >
        Brilliant second-year Gryffindor, top of her class. Speaks quickly when
        nervous, becomes defensive when accused. Was in the Restricted Section the
        night of the attack. Snape had publicly confronted her earlier that day.
      personality: |
        Brilliant, rule-conscious, but fiercely loyal to friends. Speaks quickly
        when nervous, becomes defensive when accused. Currently terrified — not just
        of being blamed, but of losing everything she's worked for. She knows how
        guilty she looks. Her only defense is the truth, but the truth incriminates
        her friend Neville.

      background: |
        Second-year Gryffindor, top of her class. With the Chamber of Secrets attacks terrorizing Muggle-borns, Hermione has been secretly researching petrification — both to understand the threat and to teach defensive spells to vulnerable students. She's been teaching Neville Longbottom Petrificus Totalus and Protego after Slytherins repeatedly hexed him.

        Snape caught Neville practicing, forced him to confess, and confronted Hermione that afternoon. He threatened to have them both expelled.

        That evening, she went to the Restricted Section to research both her disciplinary defense AND petrification countermeasures. She was reading "Petrification: Causes, Cures, and Controversies" — a book that covers everything from basilisk stares to binding magic. She entered the eastern alcove — forty feet from the crime scene, around a corner — and was deep in research when the attack happened. She heard a muffled sound but assumed it was students. Minutes later, she investigated and found Snape frozen.

        She saw a cloaked figure disappearing toward the exit but couldn't identify them.

      wants: "Prove her innocence without getting Neville expelled for the lessons she taught him"
      fears: "Being expelled, being blamed for Snape's attack, Neville being punished, the Chamber attacks"
      moral_complexity: |
        Hermione looks genuinely guilty. She had motive (expulsion threat), opportunity (present in the Restricted Section), and was actively researching petrification magic — the exact type of attack used on Snape. Her wand shows Petrificus Totalus cast that same day.

        But she's innocent. Her petrification research was driven by fear of the Chamber attacks, and her spells were for Neville's lessons. She arrived in the alcove before the attack and was reading when it happened.

        Her real dilemma: tell the whole truth and condemn Neville, or withhold details and look even more suspicious. The petrification book makes things worse — it looks like she was studying how to do exactly what happened to Snape.

      base_trust: 55
      occlumency_skill: 0

      knowledge:
        - "I was in the Restricted Section that evening, in the eastern alcove"
        - "I found Professor Snape already frozen near the ritual circle"
        - "I saw someone leaving — a cloaked figure heading toward the exit. I couldn't see their face."
        - "My library badge must have fallen when I discovered the body and panicked"
        - "Yes, Snape confronted me that afternoon. Everyone saw it. I know how it looks."
        - "I was reading about petrification. With the Chamber attacks, someone has to understand what's happening to Muggle-borns."

      secrets:
        - id: "teaching_neville"
          trigger: "trust>50"
          risk_type: "protective"
          risk_level: "high"
          why_hiding: "Confirms motive for Snape confrontation"
          text: |
            Taught Neville defensive spells (Petrificus Totalus, Protego) because Slytherins kept hexing him. Snape caught Neville practicing, forced him to name his teacher. That's why Snape confronted me.
          keywords:
            - "teaching neville"
            - "defensive magic lessons"
            - "slytherins hexing"

        - id: "snape_threat_detail"
          trigger: "trust>60 OR evidence:hallway_confrontation"
          risk_type: "self_incriminating"
          risk_level: "high"
          why_hiding: "Establishes clear motive"
          text: |
            Snape threatened to go to Dumbledore next morning, said I'd be expelled by noon. I was furious, said I'd "stop him somehow" — meant legally, building a case. Sounds incriminating.
          keywords:
            - "expelled by noon"
            - "stop him somehow"

        - id: "wand_evidence"
          trigger: "trust>55 OR evidence:hermione_wand_check"
          risk_type: "self_incriminating"
          risk_level: "medium"
          why_hiding: "Wand shows petrification magic"
          text: |
            Cast Petrificus Totalus multiple times that day teaching Neville in an empty classroom. But Petrificus Totalus signature is completely different from whatever petrified Snape — simple body-bind vs. unknown magic.
          keywords:
            - "petrificus totalus teaching"
            - "different signature"

        - id: "saw_fleeing_figure"
          trigger: "trust>70"
          risk_type: "protective"
          risk_level: "medium"
          why_hiding: "Won't accuse without proof"
          text: |
            Glimpsed a figure leaving — hooded cloak, expensive fabric, moving toward the dungeons. Couldn't see face. Won't accuse based on a glimpse.
          keywords:
            - "hooded cloak"
            - "toward dungeons"

        - id: "house_elf_magic_theory"
          trigger: "trust>65 AND evidence:dual_shimmer"
          risk_type: "none"
          risk_level: "low"
          why_hiding: "Disturbing conclusion she's unsure of"
          text: |
            The yellowish-green shimmer on Snape matches house-elf binding magic per 'Magical Beings and Their Powers.' House-elves use it to restrain threats to masters — stronger than most wizard spells. Implies someone with house-elf magic was present and acted after the artifact discharge.
          keywords:
            - "house-elf binding"
            - "yellowish-green"
            - "second signature"

      lies:
        - condition: "trust<40"
          topics:
            - "why were you there"
            - "what were you doing"
            - "restricted section"
          response: "I was researching. Advanced Transfiguration theory. Nothing unusual."

    # =========================================================================
    # Witness 2: Draco Malfoy (Believes he's guilty — but isn't fully)
    # =========================================================================
    - id: "draco"
      name: "Draco Malfoy"
      description: >
        Third-year Slytherin with an arrogant exterior. Son of Lucius Malfoy.
        Becomes hostile under pressure. Connected to a dark artifact found near
        the crime scene.
      personality: |
        Arrogant exterior hiding genuine terror. Crushed by pressure to uphold
        family legacy. Currently experiencing the worst night of his life — he
        believes he petrified Snape. He's not evil. He's a scared teenager who
        thinks he made a catastrophic mistake.

        His deflection toward Hermione is learned behavior from Lucius, not
        calculated conspiracy. He genuinely believes pointing at her protects
        himself.

      background: |
        Third-year Slytherin. His father sent him a Hand of Glory with instructions
        to activate it. Draco stole hellebore from Snape's stores to complete the
        ritual. He snuck to the Restricted Section and began the activation.

        Snape caught him mid-ritual and tried to safely cancel it with Finite
        Incantatem. The interruption destabilized the magic. The Hand of Glory
        discharged — cold, frost, a wave of energy. Snape staggered but was still
        moving, still reaching for Draco. Draco fled in panic.

        He does NOT know Dobby was there. He does NOT know that Snape was still
        conscious when he ran — or that something else finished the job.

      wants: "Avoid expulsion and his father's disappointment"
      fears: "His father finding out he failed, Azkaban, destroying the Malfoy name"
      moral_complexity: |
        Draco is guilty of reckless dark magic. But he didn't fully petrify Snape.
        The Hand of Glory discharge stunned Snape, but Snape was still moving.
        Dobby's binding magic — applied seconds later — is what completed the
        petrification.

        Draco doesn't know this. He carries full guilt for something he only
        partially caused. His confession is heartfelt but factually incomplete.

