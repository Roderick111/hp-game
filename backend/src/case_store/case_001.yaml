  # ---------------------------------------------------------------------------
  # MENTOR FEEDBACK TEMPLATES
  # ---------------------------------------------------------------------------
  mentor_feedback_templates:
    fallacies:
      confirmation_bias:
        description: "You focused on evidence supporting your initial theory and dismissed contradictory evidence."
        example: "You emphasized Hermione's motive and ignored the timeline showing she arrived after the attack."

      appeal_to_motive:
        description: "You assumed guilt based on motive alone, ignoring lack of means and opportunity."
        example: "Dobby had conflict with Snape, but house-elf magic can't produce a Hand of Glory curse."

      false_equivalence:
        description: "You treated different levels of wrongdoing as equivalent."
        example: "Hermione broke rules teaching defensive magic; Draco possessed an illegal dark artifact. These are not equivalent."

      conflation:
        description: "You combined two separate incidents into one, confusing the investigation."
        example: "Dobby's theft (3 days ago) and the attack (last night) are different crimes with different perpetrators."

    reasoning_quality:
      excellent: "Outstanding deduction, recruit. You followed the physical evidence, used the timeline to eliminate suspects, recognized the two separate crimes, and understood Snape's tragic role. Professional-quality investigation."

      good: "Solid reasoning. You reached the correct conclusion, but you missed {missed_point}. Always check the timeline first—it eliminates suspects cleanly."

      fair: "You got the right answer, but your reasoning had gaps. You relied too much on {weak_evidence} instead of the stronger physical evidence."

      poor: "Right answer, wrong reasons. You got lucky. Your reasoning was flawed: {fallacy_explanation}"

      failing: "Critical errors in your reasoning: {fallacy_list}. You ignored physical evidence, let motive blind you, and failed to distinguish between two separate crimes. Review the case and try again."

  # ---------------------------------------------------------------------------
  # BRIEFING
  # ---------------------------------------------------------------------------
  briefing:
    case_id: "case_001"

    dossier:
      title: "The Restricted Section"
      victim: "Severus Snape (Potions Master)"
      location: "Hogwarts Library - Restricted Section"
      time: "22:00 (Found)"
      status: "Petrified / St. Mungo's"
      synopsis: |
        Professor Snape found petrified in the Restricted Section. Evidence of a
        dark artifact discharge—specifically, a Hand of Glory. Ritual materials
        scattered nearby. Three suspects with means, motive, or opportunity.

        Hermione Granger had a public confrontation with Snape hours earlier—he
        threatened her expulsion. She was in the Restricted Section when he was found.

        Draco Malfoy was seen leaving his common room with a wrapped object.
        Student witnesses place him returning terrified after the attack.

        Dobby the house-elf stole ingredients from Snape days before. A note
        signed "D." was found at the scene.

        Your job: Follow the evidence. Separate the crimes. Find the truth.

    teaching_question:
      prompt: "A student with strong motive is found at a crime scene. What should you check FIRST?"
      concept_summary: "Physical Evidence: Facts over stories. Timeline over motive."
      choices:
        - id: "choice_a"
          text: "Their motive and opportunity"
          response: |
            *Mad-Eye Moody frowns*

            MOODY: "Motive and opportunity make them a SUSPECT, not a CULPRIT.
            Half the people in any crime have motive. Means and timeline are
            what separate the guilty from the unlucky. Think harder."

        - id: "choice_b"
          text: "The physical evidence and timeline"
          response: |
            *Mad-Eye Moody nods approvingly*

            MOODY: "Correct. Physical evidence doesn't lie. Timelines eliminate
            suspects. A compelling story means nothing if the facts contradict it.

            Start with what you can PROVE. Let the evidence guide you to the
            culprit—don't pick a culprit and hunt for evidence."

        - id: "choice_c"
          text: "Whether they're acting suspicious"
          response: |
            *Mad-Eye Moody's eye spins*

            MOODY: "Behavior is the WORST indicator of guilt. Innocent people
            act guilty when accused. Guilty people act innocent when confident.
            I've seen killers cry convincingly and victims look stone-cold.

            Facts. Evidence. Timeline. Not behavior. Not hunches. FACTS."

    rationality_concept: "physical_evidence_primacy"
    concept_description: "Physical evidence and timeline trump motive and behavior. Stories can mislead; facts cannot."

    transition: |
      *Mad-Eye Moody's magical eye spins, locking onto you*

      MOODY: "Three suspects. Multiple crimes. One truth.

      You've got a student who had a screaming match with the victim hours before
      he was attacked. You've got another student seen fleeing the scene. And
      you've got a house-elf who was already stealing from the victim.

      Everyone has secrets. Everyone looks guilty of something. Your job is to
      figure out who's guilty of THIS.

      Talk to the witnesses. Examine the crime scene. Follow the physical evidence.
      Check the timeline. Don't let a compelling story override what the facts
      tell you.

      And recruit? Remember: motive makes someone a suspect. Evidence makes them
      guilty. Don't confuse the two.

      **CONSTANT VIGILANCE.**"

