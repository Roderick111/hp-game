# Case 002: The Restricted Section (REDESIGN v2)
# Layer 1 Architecture - Building skeleton before complexity

case:
  # -------------------------------------------------------------------------
  # METADATA
  # -------------------------------------------------------------------------
  id: "case_002"
  title: "The Fallen Bookshelf"
  difficulty: "advanced"
  description: "A brilliant student crushed by a falling bookshelf. The library says accident. The evidence says murder."
  crime_type: "murder"
  hook: "Helena Blackwood died reaching for a book. But the book she wanted wasn't on that shelf."
  twist: "Helena came to save her mentor's reputation, not destroy it. Vector killed the one person still willing to believe in her."

  # -------------------------------------------------------------------------
  # VICTIM
  # -------------------------------------------------------------------------
  victim:
    name: "Helena Blackwood"
    age: "Fourth-year Ravenclaw"
    humanization: |
      You remember her from the library — always at the same table near the
      Arithmancy section, quill scratching furiously, lips moving as she
      worked through proofs. She had a habit of humming number sequences
      under her breath. Three years she spent extending Professor Vector's
      theorem, building her academic future on her mentor's foundation.

      She didn't discover a fraud. She discovered her hero had feet of clay.
      And she tried to give that hero a second chance.
    memorable_trait: "Hummed Arithmancy sequences while working"
    time_of_death: "10:05 PM"
    cause_of_death: "Crushed by falling bookshelf (staged as accident)"

  # -------------------------------------------------------------------------
  # PHYSICAL LAYOUT (for spatial reasoning)
  # -------------------------------------------------------------------------
  # Library Wing Layout:
  #
  #   THIRD FLOOR CORRIDOR (Filch patrol route)
  #            │
  #   ┌────────┴────────────────────────────────────┐
  #   │  LIBRARY MAIN HALL                          │
  #   │  ┌─────────┐                                │
  #   │  │ PINCE'S │     Study Tables               │
  #   │  │ OFFICE  │     (Adrian was here)          │
  #   │  └─────────┘              ┌────────────────┐│
  #   │                           │RESTRICTED SECT.││
  #   │  ┌──────────┐             │                ││
  #   │  │ STUDY    │─thin wall──►│  Crime Scene   ││
  #   │  │ ALCOVE   │             │                ││
  #   │  │(Marcus)  │             │                ││
  #   │  └──────────┘             └────────────────┘│
  #   └─────────────────────────────────────────────┘
  #
  # Distances (approximate):
  # - Main Hall to Restricted Section: ~25 meters
  # - Alcove to Restricted Section: Adjacent (thin wall)
  # - Pince's Office to Restricted Section: ~20 meters
  # - Third Floor Corridor to Library: ~50 meters
  # - Great Hall to Library: ~5-7 minute walk
  #
  # Sound propagation:
  # - Vaulted ceiling = echoes carry throughout main hall
  # - Thin wall between alcove and Restricted Section
  # - Heavy door muffles sound from Pince's office

  # -------------------------------------------------------------------------
  # LOCATIONS
  # -------------------------------------------------------------------------
  locations:
    library_entrance:
      id: "library_entrance"
      name: "Library Main Hall"
      type: "micro"
      description: |
        The library is tomb-silent at this hour. Moonlight cuts through tall
        windows, illuminating dust motes that drift like snow. The main hall
        stretches before you — rows of shadowed shelves, abandoned study
        tables, the faint smell of old parchment and candle wax.

        The vaulted ceiling creates strange acoustics. Sound carries far
        in this silence — a dropped book echoes like thunder.

        To the left, Madam Pince's office door stands closed. Ahead, the
        iron gate to the Restricted Section hangs slightly open — unusual.
        A single desk near the entrance has papers scattered across it,
        a quill lying in a pool of still-wet ink.
      surface_elements:
        - "Iron gate to Restricted Section (ajar)"
        - "Madam Pince's office (closed)"
        - "Study desk with scattered papers"
        - "Wet ink puddle on desk"
        - "Moonlit windows"
      witnesses_present: []
      not_present:
        - triggers:
            - "blood"
            - "blood stains"
            - "signs of struggle"
          response: "No blood or signs of struggle here. The entrance hall looks undisturbed — whatever happened was deeper in the library."
        - triggers:
            - "body"
            - "victim"
            - "helena"
          response: "Helena's body is in the Restricted Section, not here. The entrance shows no signs of violence."
      spell_contexts:
        available_spells: ["lumos", "revelio", "homenum_revelio"]
      hidden_evidence:
        - id: "abandoned_quill"
          name: "Abandoned Quill (Wet Ink)"
          location_found: "library_entrance"
          type: "physical"
          discovery_guidance: "Revealed when player examines the study desk, looks at the quill, or investigates the ink puddle."
          description: |
            A fine eagle-feather quill lies abandoned in a spreading pool
            of ink. The parchment beneath shows a half-finished sentence:
            "Helena said we should wait, but I think—" The writing stops
            mid-word, as if the writer heard something and fled.
          tag: "[EVIDENCE: abandoned_quill]"
          significance: "Someone was here when the 'accident' happened and fled immediately."
          strength: 45
          points_to: ["adrian_clearmont"]

        - id: "research_partnership_notes"
          name: "Joint Research Notes"
          location_found: "library_entrance"
          type: "documentary"
          discovery_guidance: "Revealed when player reads the parchment, examines scattered papers, or checks notes on the desk."
          description: |
            Two distinct handwriting styles cover these parchment pages.
            Helena's precise script alternates with a messier, cramped hand.

            The notes discuss Vector's 1991 theorem: "H: Found original
            manuscript in archives. The 1.618 variable appears in final
            proof but NOT in draft calculations. How? A: Fabricated?
            H: Don't jump to conclusions. We need more proof. A: We should
            tell Dumbledore. H: No. She deserves the chance to explain first.
            I owe her that."
          tag: "[EVIDENCE: research_partnership_notes]"
          significance: "CRITICAL - Proves Helena and Adrian investigated together. Helena wanted to PROTECT Vector."
          strength: 90
          points_to: ["adrian_clearmont", "professor_vector"]

    restricted_section:
      id: "restricted_section"
      name: "Restricted Section - Crime Scene"
      type: "micro"
      description: |
        The smell hits you first — splintered oak, dust, and something
        metallic. A massive bookshelf has toppled, ancient grimoires
        scattered like fallen soldiers. Beneath the wreckage, a shape
        that was once a person.

        Helena Blackwood lies crumpled under hundreds of pounds of oak
        and leather-bound knowledge. Her wand is still clutched in her
        right hand. Her bag lies several feet away, near the manuscript
        shelves — not near the fallen bookcase.

        The surrounding shelves lean in like witnesses afraid to speak.
        The stone walls are thick here, but one wall — the one nearest
        the hidden alcove — is noticeably thinner. Sound would carry
        through it easily.
      surface_elements:
        - "Toppled oak bookshelf (massive)"
        - "Helena's body beneath wreckage"
        - "Scattered ancient grimoires (one lies open)"
        - "Helena's wand (in her hand)"
        - "Helena's bag (near manuscript shelves)"
        - "Undisturbed dust on nearby shelves"
        - "Splintered wood debris scattered widely"
        - "Faint scuff marks in the dust near entrance"
      witnesses_present: []
      not_present:
        - triggers:
            - "secret passage"
            - "hidden door"
            - "escape route"
          response: "The Restricted Section has no hidden exits. Whoever was here left through the entrance."
        - triggers:
            - "poison"
            - "potion residue"
          response: "No potions or poison were involved. Helena was killed by the falling bookshelf."
        - triggers:
            - "blood trail"
            - "drag marks"
          response: "No drag marks or blood trails. Helena died where she fell — the impact was instant."
      spell_contexts:
        available_spells: ["lumos", "revelio", "prior_incantato", "specialis_revelio"]
        special_interactions:
          prior_incantato:
            targets: ["helena's wand", "wand", "her wand", "victim's wand"]
            reveals_evidence: ["helena_last_spell"]
          revelio:
            targets: ["ceiling", "above", "beams", "overhead"]
            reveals_evidence: ["levitation_scorch"]
      hidden_evidence:
        - id: "helena_last_spell"
          name: "Helena's Last Spell (Prior Incantato)"
          location_found: "restricted_section"
          type: "magical"
          discovery_guidance: "Revealed when player casts Prior Incantato on Helena's wand or examines the wand magically."
          description: |
            A ghostly golden thread emerges from Helena's wand, forming
            the unmistakable signature of Lumos — a simple light spell.

            Her last spell was illumination. She wasn't casting anything
            that could have destabilized a bookshelf. She was just trying
            to see in the dark.
          tag: "[EVIDENCE: helena_last_spell]"
          significance: "CRITICAL - Proves Helena didn't cause the accident. She cast light, not levitation."
          strength: 100
          contradicts: ["accident_theory"]

        - id: "levitation_scorch"
          name: "Levitation Scorch Marks"
          location_found: "restricted_section"
          type: "magical"
          discovery_guidance: "Revealed when player looks up, examines the ceiling or beams, or casts Revelio overhead."
          description: |
            Revelio illuminates faint blue-white scorch marks on the
            ceiling beam directly above where the bookshelf stood. The
            pattern is unmistakable to anyone trained in magical forensics:
            sustained high-power Wingardium Leviosa.

            This wasn't a brief lift. Someone held that bookshelf in the
            air for several seconds before dropping it. That requires
            concentration and power far beyond student capability.
          tag: "[EVIDENCE: levitation_scorch]"
          significance: "CRITICAL - Proves murder. High-power sustained levitation requires adult-level magic."
          strength: 100
          points_to: ["professor_vector", "madam_pince"]
          contradicts: ["accident_theory", "marcus_flint", "adrian_clearmont", "argus_filch"]

        - id: "shelf_positioning"
          name: "Shelf Positioning Evidence"
          location_found: "restricted_section"
          type: "physical"
          discovery_guidance: "Revealed when player examines the shelf base, looks at the floor beneath it, or investigates the shelf's original position."
          description: |
            Deep scuff marks score the stone floor where the bookshelf
            originally stood. The shelf was MOVED — dragged several feet
            from its original position to directly above where Helena's
            body now lies.

            This wasn't a shelf that happened to fall. It was positioned.
            Someone set a trap.
          tag: "[EVIDENCE: shelf_positioning]"
          significance: "Proves premeditation. The killer positioned the shelf before dropping it."
          strength: 85
          points_to: ["professor_vector", "madam_pince"]

        - id: "bag_location"
          name: "Helena's Bag Position"
          location_found: "restricted_section"
          type: "physical"
          discovery_guidance: "Revealed when player examines Helena's bag, checks her belongings, or questions why they're far from the body."
          description: |
            Helena's bag lies near the manuscript archive shelves — the
            opposite side of the room from where she died. If she'd been
            browsing near the fallen bookshelf, her bag would be there too.

            She wasn't near that shelf by accident. She was lured or
            forced there.
          tag: "[EVIDENCE: bag_location]"
          significance: "Shows Helena wasn't browsing near the fallen shelf. She was positioned there."
          strength: 70
          contradicts: ["accident_theory"]

        - id: "second_wand"
          name: "Unknown Wand"
          location_found: "restricted_section"
          type: "physical"
          discovery_guidance: "Revealed when player searches through debris, looks under the bookshelf, or casts Revelio on the wreckage."
          description: |
            Beneath the fallen bookshelf, partially buried in splintered wood,
            lies a second wand. Helena's wand is still clutched in her right
            hand — so whose wand is this?

            The wand is elegant, made of dark wood with silver filigree. It
            feels cold to the touch, almost dormant.
          tag: "[EVIDENCE: second_wand]"
          significance: "AMBIGUOUS - A second wand suggests a second person. But whose? Creates uncertainty about who else was present."
          strength: 60
          points_to: ["unknown"]
          # NOTE: This is Helena's backup wand. Her journal mentions bringing
          # "backup" in case of trouble. Resolves when journal is fully read.

        - id: "torn_robe_fragment"
          name: "Torn Robe Fragment"
          location_found: "restricted_section"
          type: "physical"
          discovery_guidance: "Revealed when player examines the splinters, checks the entrance, or searches near the doorway."
          description: |
            A scrap of dark fabric hangs from a splintered bookshelf near
            the Restricted Section entrance. The fabric is quality wool,
            and the lining shows a distinctive blue — Ravenclaw colors.

            Someone in Ravenclaw robes passed this way in a hurry. The tear
            suggests they were moving fast, careless.
          tag: "[EVIDENCE: torn_robe_fragment]"
          significance: "AMBIGUOUS - Points to Adrian (Ravenclaw, fled scene) but doesn't prove involvement in murder. Could be from fleeing OR from attack."
          strength: 55
          points_to: ["adrian_clearmont"]
          # NOTE: This is from Adrian fleeing after hearing the crash.
          # Marcus confirms seeing him run. Not evidence of guilt.

        - id: "fallen_book_open"
          name: "Fallen Book (Open Page)"
          location_found: "restricted_section"
          type: "physical"
          discovery_guidance: "Revealed when player examines the scattered books, checks the open book, or reads the visible page."
          description: |
            Among the scattered grimoires, one book lies spine-cracked and
            open. The visible page is from "Arithmantic Ethics: Historical
            Cases of Academic Fraud in Magical Research."

            The chapter heading reads: "The Consequences of Fabricated
            Variables: Three Case Studies." Several passages are underlined
            in fresh ink.
          tag: "[EVIDENCE: fallen_book_open]"
          significance: "BURIED CLUE - Appears to be random debris, but Helena was researching this topic. Connects to Vector's fraud if player makes the connection."
          strength: 35
          points_to: ["professor_vector"]

        - id: "dust_footprints"
          name: "Dust Footprint Patterns"
          location_found: "restricted_section"
          type: "magical"
          discovery_guidance: "Revealed when player casts Revelio on the floor, checks the dust, or examines footprint patterns."
          description: |
            Revelio reveals three distinct sets of footprints preserved in
            the dust:

            SET A (small, pointed boots): Leads from entrance to manuscript
            shelves, then toward the fallen bookshelf area. Helena's path.

            SET B (adult, heeled shoes): CIRCLES the bookshelf area multiple
            times before stopping. Someone was positioning themselves — or
            positioning something.

            SET C (worn, flat boots): Approaches the body directly, stops,
            then retreats toward the entrance. Someone found the body and
            backed away.
          tag: "[EVIDENCE: dust_footprints]"
          significance: "Proves THREE people were present. Set B's circling pattern suggests premeditation — someone was positioning the bookshelf. Set C matches Filch's account."
          strength: 75
          points_to: ["professor_vector", "argus_filch"]

    study_alcove:
      id: "study_alcove"
      name: "Hidden Study Alcove"
      type: "micro"
      description: |
        Behind a moth-eaten tapestry depicting Rowena Ravenclaw, a cramped
        alcove holds a single chair and small desk. The air is thick with
        an oily, spicy scent — burnt cloves and something darker.

        A chair sits pushed back as if recently vacated. The seat cushion
        is still warm. The wall separating this alcove from the Restricted
        Section is unusually thin — you can hear muffled voices, footsteps,
        even breathing from the other side. A crash in there would sound
        like thunder in here.
      surface_elements:
        - "Warm vacated chair"
        - "Spicy clove smell"
        - "Moth-eaten tapestry entrance"
        - "Thin wall to Restricted Section"
        - "Small cluttered desk"
        - "Dark scorch marks on back wall"
      witnesses_present: ["marcus_flint"]
      not_present:
        - triggers:
            - "blood"
            - "body"
            - "victim"
          response: "No blood or remains here. The alcove is cramped but undisturbed — whatever violence happened was in the Restricted Section."
        - triggers:
            - "wand"
            - "dropped wand"
          response: "No wands lying around. Marcus has his own wand. Any other wands would be at the crime scene."
      spell_contexts:
        available_spells: ["lumos", "revelio", "specialis_revelio"]
      hidden_evidence:
        - id: "hand_of_glory_residue"
          name: "Hand of Glory Residue"
          location_found: "study_alcove"
          type: "magical"
          discovery_guidance: "Revealed when player investigates the smell, examines the oily residue, or casts Specialis Revelio."
          description: |
            Specialis Revelio confirms the oily residue coating the desk
            is the distinctive byproduct of a Hand of Glory — a dark
            artifact that provides light only the holder can see.

            Someone was using banned dark magic in here tonight.
          tag: "[EVIDENCE: hand_of_glory_residue]"
          significance: "Proves Marcus used a dark artifact. But for what purpose?"
          strength: 65
          points_to: ["marcus_flint"]

        - id: "helena_payment_note"
          name: "Helena's Instructions to Marcus"
          location_found: "study_alcove"
          type: "documentary"
          discovery_guidance: "Revealed when player searches the desk, checks papers, or examines notes in the alcove."
          description: |
            A folded parchment in Helena's handwriting:

            "M — 10 PM sharp. Loud duel, lots of sparks. The alcove has
            good acoustics; it'll echo through the library. Keep it going
            until 10:15 at least. If I'm not back by 10:30, take the
            envelope to Dumbledore. Don't open it. 50 Galleons on delivery.
            — H.B."
          tag: "[EVIDENCE: helena_payment_note]"
          significance: "CRITICAL - Proves Helena HIRED Marcus for distraction. She trusted him with insurance."
          strength: 95
          points_to: ["marcus_flint"]
          contradicts: ["marcus_as_killer"]

        - id: "sealed_envelope"
          name: "Sealed Envelope for Dumbledore"
          location_found: "study_alcove"
          type: "documentary"
          discovery_guidance: "Revealed when player searches under the chair, checks beneath the desk, or casts Revelio on the furniture."
          description: |
            Stuck to the underside of the chair with a Permanent Sticking
            Charm — a thick parchment envelope sealed with Helena's wax
            sigil. Addressed in her precise hand:

            "Headmaster Albus Dumbledore — DELIVER ONLY IF I DO NOT
            RETURN BY 10:30 PM"

            The envelope is heavy. Multiple pages inside. This was her
            insurance policy.
          tag: "[EVIDENCE: sealed_envelope]"
          significance: "CRITICAL - Proves Helena anticipated danger. Marcus was her messenger, not her killer."
          strength: 100
          points_to: ["marcus_flint"]
          contradicts: ["marcus_as_killer"]

        - id: "duel_scorch_pattern"
          name: "Alcove Wall Scorch Pattern"
          location_found: "study_alcove"
          type: "magical"
          discovery_guidance: "Revealed when player examines the walls, checks the scorch marks, or casts Revelio on the alcove."
          description: |
            The alcove wall bears fresh scorch marks from spell discharge.
            The pattern is unusual — sustained, powerful bursts that left
            deep burns in the stone. More intensity than typical student
            dueling practice.

            Either Marcus Flint is hiding significant magical talent, or
            something amplified his spells considerably.
          tag: "[EVIDENCE: duel_scorch_pattern]"
          significance: "AMBIGUOUS - Suggests Marcus has more magical power than expected. But Hand of Glory artifacts can amplify dueling spells. Creates temporary doubt about his magical limitations."
          strength: 55
          points_to: ["marcus_flint"]
          # NOTE: The Hand of Glory amplified his practice duels. He still
          # couldn't sustain high-power Leviosa for 10+ seconds.

    pince_office:
      id: "pince_office"
      name: "Madam Pince's Office"
      type: "micro"
      description: |
        Obsessively organized. Every quill aligned, every book spine
        flush with its neighbors. The checkout log sits on a lectern
        near the door. A grandfather clock ticks in the corner — its
        enchantment records the time of every entry and exit.

        The wastebin has been recently emptied, but a few scraps of
        parchment missed the cleaning.
      surface_elements:
        - "Checkout log on lectern"
        - "Enchanted grandfather clock"
        - "Obsessively organized desk"
        - "Nearly-empty wastebin"
        - "Archive request forms"
      witnesses_present: ["madam_pince"]
      not_present:
        - triggers:
            - "blood"
            - "signs of struggle"
          response: "The office is immaculate. No signs of violence — Pince keeps everything obsessively tidy."
        - triggers:
            - "dark artifact"
            - "cursed object"
          response: "Nothing dark or cursed in here. Pince runs a tight ship — no banned items in her office."
      spell_contexts:
        available_spells: ["revelio", "specialis_revelio"]
      hidden_evidence:
        - id: "erased_log_entries"
          name: "Erased Log Entries"
          location_found: "pince_office"
          type: "documentary"
          discovery_guidance: "Revealed when player examines the checkout log, casts Specialis Revelio on it, or looks for erasures."
          description: |
            Specialis Revelio reveals ghostly writing beneath the current
            entries. THREE names were frantically erased at 10:15 PM:

            "S. Vector — 9:45 PM"
            "M. Flint — 9:50 PM"
            "A. Cl—" (rest too damaged to read)

            Someone went to great lengths to hide who was in the library
            that night. The erasure spell was powerful but hurried.
          tag: "[EVIDENCE: erased_log_entries]"
          significance: "CRITICAL - Proves Vector was present. But who erased the log, and why hide multiple names?"
          strength: 100
          points_to: ["professor_vector", "argus_filch"]

        - id: "archive_request_forms"
          name: "Old Archive Request Forms"
          location_found: "pince_office"
          type: "documentary"
          discovery_guidance: "Revealed when player searches Pince's desk, checks archive forms, or looks through her files."
          description: |
            Buried in a drawer, you find archive request forms from 1992 —
            the year after Vector's theorem was published. Professor Vector
            requested that "all draft manuscripts and working papers related
            to the 1991 Arithmancy proof" be moved to restricted archives
            with access "limited to myself only."

            Madam Pince approved and countersigned the request.
          tag: "[EVIDENCE: archive_request_forms]"
          significance: "Proves Vector hid the original manuscripts. Pince helped, knowingly or not."
          strength: 85
          points_to: ["professor_vector", "madam_pince"]

        - id: "enchanted_clock_record"
          name: "Enchanted Clock Entry Record"
          location_found: "pince_office"
          type: "magical"
          discovery_guidance: "Revealed when player examines the grandfather clock, checks its records, or casts Revelio on it."
          description: |
            The enchanted clock records all entries and exits from Pince's
            office. Tonight's record shows:

            "I. Pince — EXIT 9:30 PM (dinner)"
            "I. Pince — ENTER 10:22 PM"

            Pince wasn't in her office at 10:05 PM when Helena died. She
            was at dinner. She only returned after the murder.
          tag: "[EVIDENCE: enchanted_clock_record]"
          significance: "Provides Pince's alibi. She wasn't in the library during the murder."
          strength: 90
          contradicts: ["pince_as_killer"]

        - id: "helena_journal_page"
          name: "Torn Journal Page"
          location_found: "pince_office"
          type: "documentary"
          discovery_guidance: "Revealed when player checks the wastebin, examines parchment scraps, or searches the bin."
          description: |
            A torn page from Helena's journal, discarded in the bin.
            The journal itself is missing — only this ripped page remains.

            Helena must have left her journal in Pince's office earlier
            today when requesting archive access. Someone found it, read
            it, and tore out this incriminating page.

            The torn page reads:

            "...tonight I offer Professor Vector a choice. Fix the error
            together, publish a correction, preserve her dignity. I've
            taken precautions — copies with A.C., envelope with M.F. to
            deliver at 10:30 if I don't return. Not a threat. Insurance.

            I'm bringing my backup wand, just in case. Probably paranoid.

            She was my mentor for three years. She made a mistake fifteen
            years ago. Everyone deserves a chance to make things right.

            I just hope she sees this as the gift it is."
          tag: "[EVIDENCE: helena_journal_page]"
          significance: "CRITICAL - Proves Helena's intention was to HELP Vector, not expose her. Also proves someone (Vector) found and read her plans before the meeting."
          strength: 100
          points_to: ["professor_vector", "adrian_clearmont", "marcus_flint"]

        - id: "vector_office_key"
          name: "Spare Key (Vector's Office)"
          location_found: "pince_office"
          type: "physical"
          discovery_guidance: "Revealed when player searches the shelves, checks behind books, or casts Revelio on the bookshelf."
          description: |
            Hidden behind a row of cataloguing guides on Pince's shelf, a
            small brass key bears a tag: "S. Vector - Office Spare."

            Why does the librarian have a spare key to Professor Vector's
            private office? What arrangement exists between them?
          tag: "[EVIDENCE: vector_office_key]"
          significance: "AMBIGUOUS - Suggests a connection between Pince and Vector. Could imply conspiracy, or could be routine (librarian keeps spare keys for all staff). Creates doubt about Pince's innocence."
          strength: 50
          points_to: ["professor_vector", "madam_pince"]
          # NOTE: Mundane explanation — Pince keeps spare keys for all staff
          # offices as building manager. Not evidence of conspiracy.

        - id: "wax_seal_fragments"
          name: "Wax Seal Fragments"
          location_found: "pince_office"
          type: "physical"
          discovery_guidance: "Revealed when player searches the wastebin more carefully, examines the bin closely, or casts Revelio on the wax fragments."
          description: |
            Tiny fragments of red wax scattered at the bottom of the
            wastebin, nearly invisible among the parchment scraps. The
            wax color matches Helena's personal seal — the same distinctive
            crimson used on the Dumbledore envelope.

            Something sealed with Helena's wax was opened here. But the
            journal page was torn, not carefully unsealed. Someone read
            Helena's private correspondence and discarded the evidence.
          tag: "[EVIDENCE: wax_seal_fragments]"
          significance: "BURIED CLUE - Proves someone opened Helena's sealed writing in this office. The journal was TORN from a sealed journal. Vector found and read Helena's insurance notes, then ripped out the incriminating page."
          strength: 45
          points_to: ["professor_vector"]

  # -------------------------------------------------------------------------
  # WITNESSES
  # -------------------------------------------------------------------------
  witnesses:
    - id: "professor_vector"
      name: "Professor Septima Vector"
      personality: |
        Precise and controlled. She speaks in measured sentences, each
