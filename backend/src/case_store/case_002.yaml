  # -------------------------------------------------------------------------
  # SOLUTION
  # -------------------------------------------------------------------------
  solution:
    culprit: "professor_vector"
    method: "Sustained high-power Wingardium Leviosa to levitate and drop a massive bookshelf onto Helena. Staged as accident, then blackmailed Filch into cleaning evidence."
    motive: "Self-preservation. Helena discovered Vector's 15-year academic fraud. Despite Helena's offer to help fix it quietly, Vector saw her 'insurance' measures as permanent leverage and killed her."
    key_evidence:
      - "helena_last_spell"
      - "levitation_scorch"
      - "erased_log_entries"
      - "helena_journal_page"
      - "research_partnership_notes"
      - "sealed_envelope"
      - "archive_request_forms"
      - "dust_footprints"
      - "wax_seal_fragments"

    deductions_required:
      - "Helena's last spell (Lumos) proves she wasn't manipulating the shelf — eliminates accident theory."
      - "Scorch marks show sustained high-power levitation — eliminates students and Filch (Squib)."
      - "Erased log proves Vector was present and covered her tracks."
      - "Helena's journal proves she intended to HELP Vector, not expose her — establishes tragic motive."
      - "Archive request forms from 1992 prove Vector hid evidence of fraud for 15 years."
      - "Pince's clock alibi eliminates her despite having magical capability."
      - "Helena's payment note and sealed envelope prove Marcus was her ally, not enemy."
      - "Dust footprints show THREE people present — Set B (circling) proves premeditation."
      - "Wax seal fragments prove someone opened Helena's sealed journal in Pince's office — Vector read her insurance notes."

    ambiguous_evidence_resolutions:
      - evidence: "second_wand"
        initial_interpretation: "A second person was attacked or killer dropped their wand"
        true_explanation: "Helena's backup wand — her journal mentions bringing 'backup in case of trouble'"
      - evidence: "torn_robe_fragment"
        initial_interpretation: "Adrian was at crime scene during attack"
        true_explanation: "Torn during Adrian's panicked flight AFTER hearing crash — Marcus confirms seeing him run"
      - evidence: "duel_scorch_pattern"
        initial_interpretation: "Marcus has hidden high-power magical ability"
        true_explanation: "Hand of Glory artifact amplified his dueling practice — doesn't change his Leviosa limitations"
      - evidence: "vector_office_key"
        initial_interpretation: "Pince and Vector are co-conspirators"
        true_explanation: "Pince keeps spare keys for all staff offices as building manager — routine procedure"

    correct_reasoning_requires:
      - "Distinguish between means, motive, and opportunity for each suspect."
      - "Recognize that 'guilty behavior' (Adrian fleeing, Filch cleaning) doesn't equal guilt."
      - "Understand magical capability eliminates three suspects (Marcus, Adrian, Filch)."
      - "Follow the web of relationships: Helena trusted Marcus and Adrian; she feared only Vector."
      - "Recognize the tragic irony: Vector killed someone trying to save her."

    common_mistakes:
      - error: "Accuse Marcus Flint"
        reason: "Present at scene, dark artifact, took money from victim, name erased from log, alcove scorch marks suggest high power."
        why_wrong: "Helena PAID him for distraction and trusted him with her insurance envelope. He had no motive — she was his employer. Alcove scorch marks are from Hand of Glory amplification of dueling spells, not evidence of Leviosa capability. Insufficient magical power for sustained levitation."

      - error: "Accuse Adrian Clearmont"
        reason: "Present at scene, fled immediately, terrified and guilty-acting, has manuscript copies, torn robe fragment at crime scene."
        why_wrong: "Research partner with Helena investigating TOGETHER. She gave him copies for safekeeping. Fled because he heard the murder and panicked — Marcus saw him run AFTER the crash. Robe fragment is from fleeing, not attacking. No motive — they were allies."

      - error: "Accuse Madam Pince"
        reason: "Adult with magical power, covered for Vector's archive restrictions, protective of library, has Vector's office key."
        why_wrong: "Enchanted clock proves she was at dinner during murder (alibi). She helped Vector unknowingly with archive requests but had no direct connection to Helena or the fraud. The office key is routine — she keeps spares for all staff offices."

      - error: "Suspect unknown third party based on second wand"
        reason: "Second wand found at crime scene suggests another attacker or victim."
        why_wrong: "The second wand is Helena's backup — her journal mentions bringing 'backup in case of trouble.' She anticipated danger and came prepared."

      - error: "Accuse Argus Filch"
        reason: "Found body first, cleaned scene, erased log, acting extremely guilty."
        why_wrong: "Squib — cannot cast ANY magic, let alone high-power levitation. Helena HELPED him (Kwikspell secret). He was blackmailed into cover-up AFTER the murder."

      - error: "Accept accident theory"
        reason: "Dangerous location, heavy books, student alone at night."
        why_wrong: "Helena's last spell was Lumos (light, not levitation). Shelf was deliberately positioned. Scorch marks prove external high-power magic. Bag location shows she wasn't browsing near fallen shelf."

    fallacies_to_catch:
      - fallacy: "authority_bias"
        example: "Refusing to suspect Vector because 'Professors don't murder students' or trusting her composure."

      - fallacy: "guilt_by_association"
        example: "Accusing Marcus because he took Helena's money, ignoring that she willingly paid him."

      - fallacy: "availability_heuristic"
        example: "Suspecting whoever was found at the scene first (Filch), ignoring actual evidence chain."

      - fallacy: "correlation_not_causation"
        example: "Adrian fled = Adrian guilty. Filch cleaned = Filch killed. Presence/behavior doesn't equal guilt."

    # -------------------------------------------------------------------------
    # CONTRADICTION WEB - How witness statements resolve
    # -------------------------------------------------------------------------
    contradiction_resolution:
      - contradiction: "Vector's alibi vs Filch's testimony"
        vector_claims: "Was in office grading papers all night"
        filch_reveals: "She came from INSIDE the Restricted Section at 10:07"
        resolution: "Filch destroys Vector's alibi — she was at crime scene"
        key_evidence: ["found_body_earlier", "the_cleanup"]
        trust_required: "Filch trust > 75"

      - contradiction: "Official timeline vs actual timeline"
        official_story: "Body discovered at 10:30 by Filch and Pince"
        filch_reveals: "Found at 10:07, still warm. 23 minutes of cover-up."
        resolution: "The 'discovery' was staged after cleanup"
        key_evidence: ["found_body_earlier", "erased_log_entries"]
        trust_required: "Filch trust > 75"

      - contradiction: "Vector's 'accident' framing vs Adrian's testimony"
        vector_implies: "Tragic accident, dangerous books"
        adrian_reveals: "Heard woman's voice, Helena crying, 'how could you lie for fifteen years'"
        resolution: "Adrian identifies Vector's voice at confrontation"
        key_evidence: ["heard_the_confrontation"]
        trust_required: "Adrian trust > 85"

      - contradiction: "Adrian's changing location"
        low_trust: "In the common room studying"
        high_trust: "Near Restricted Section entrance"
        resolution: "He was close enough to hear the murder, fled in panic"
        key_evidence: ["abandoned_quill", "torn_robe_fragment"]
        trust_required: "Adrian trust > 55"

      - contradiction: "Pince's 'commotion' vs Vector/Filch composure"
        pince_reveals: "Heard raised voices, woman sharp, then grinding stone"
        pince_observes: "Vector and Filch were 'too composed' over the body"
        resolution: "Pince suspects but won't accuse colleagues directly"
        key_evidence: ["heard_something_returning"]
        trust_required: "Pince trust > 65"

      - contradiction: "Marcus's name erased but he knows he signed in"
        marcus_claims: "Someone erased my name. That takes real magic — not Filch's kind."
        filch_reveals: "Vector cast the spell, made me scrub after"
        resolution: "Vector erased log to hide her presence, caught Marcus too"
        key_evidence: ["erased_log_entries", "the_cleanup"]
        trust_required: "Marcus knowledge + Filch trust > 85"

      - contradiction: "Vector denies journal knowledge vs wax fragments"
        vector_lies: "I wouldn't know anything about Helena's private writings"
        evidence_shows: "Wax fragments from Helena's seal in Pince's wastebin"
        resolution: "Vector found journal in Pince's office, read it, tore page"
        key_evidence: ["helena_journal_page", "wax_seal_fragments"]
        trust_required: "Evidence discovery"

    triangulation_paths:
      - path: "Filch + Adrian → Vector"
        description: "Filch places Vector inside Restricted Section; Adrian identifies woman's voice confronting Helena about 'lying for fifteen years'"
        conclusion: "Only Vector matches both criteria"

      - path: "Marcus + Filch → Log Erasure"
        description: "Marcus knows his name was erased by magic; Filch confirms Vector cast the spell"
        conclusion: "Vector erased the log to hide her presence"

      - path: "Pince + Physical Evidence → Staged Discovery"
        description: "Pince heard voices before arrival; clock shows 10:22 return; but Vector/Filch were 'already there, too composed'"
        conclusion: "The 'discovery' was rehearsed during 23-minute cover-up"

  # -------------------------------------------------------------------------
  # POST-VERDICT CONTENT
  # -------------------------------------------------------------------------
  post_verdict:
    correct:
      confrontation:
        - speaker: "moody"
          text: "Professor Vector. Fifteen years you built your reputation on sand. And when someone offered to help you rebuild on solid ground, you crushed her."
        - speaker: "professor_vector"
          text: "She said she came to help me. 'We can fix this together, Professor.' Do you know how that sounded? After fifteen years of waiting for someone to discover the truth?"
          tone: "hollow"
        - speaker: "moody"
          text: "It sounded like salvation. And you heard a threat."
        - speaker: "professor_vector"
          text: "She had copies. Distributed copies. An envelope for Dumbledore. She called it 'insurance.' I heard 'leverage.' I heard 'you belong to me now.'"
          tone: "breaking"
        - speaker: "professor_vector"
          text: "She wasn't trying to own me. She was trying to save me. And I... I killed her for it. I killed the one student who still believed in me."
          tone: "quiet"
        - speaker: "moody"
          text: "She hummed Arithmancy sequences while she worked. Did you know that? Just like you did at her age. She was becoming you — the you that never lied."
        - speaker: "professor_vector"
          text: "I know. I heard her humming that night. Right before I..."
          tone: "breaking"
        - speaker: "moody"
          text: "Azkaban will give you time to think about what you've done. Take her away."

      aftermath: |
        Professor Septima Vector was arrested and her fifteen-year fraud
        exposed to the academic community. The scandal rocked the
        Arithmancy world — dozens of papers built on her theorem required
        retraction or revision.

        Helena's posthumous correction of the theorem — completed by
        Adrian Clearmont from her notes — was published six months later.
        The revised proof is now taught as the "Blackwood Correction."

        Argus Filch kept his job. Dumbledore learned of his Kwikspell
        correspondence and, instead of firing him, quietly arranged for
        private tutoring. Filch refused, but something in him changed.
        He started leaving the library lights on later.

        Marcus Flint delivered Helena's sealed envelope to Dumbledore
        three days after her death. Inside was her complete proof of
        Vector's fraud, and a handwritten note:

        "If you're reading this, I didn't come back. Please make sure
        Professor Vector gets help. She made a mistake fifteen years
        ago, and I think it's been eating at her ever since. —H.B."

        Even in death, Helena tried to save her mentor.

    wrong_suspects:
      marcus_flint:
        moody_response: |
          MOODY: "Flint? You're chasing a schoolyard duelist while the
          KILLER sits in the staff room!

          Yes, Helena paid him. Yes, he has her envelope. But THINK —
          why would she give evidence to her own killer? She TRUSTED
          him to deliver it if she died. He was her insurance policy,
          not her enemy.

          Look at the scorch marks on that ceiling. Sustained high-power
          Wingardium Leviosa. Flint can barely levitate a feather for
          ten seconds. That magic required YEARS of practice.

          And his motive? She was PAYING him. You don't kill your meal
          ticket.

          Think harder. Who had the POWER and the DESPERATION?"
        why_innocent: "Helena paid him for distraction and trusted him with Dumbledore's envelope. Insufficient magical power for sustained levitation. No motive — she was his employer."

      adrian_clearmont:
        moody_response: |
          MOODY: "Clearmont? He fled the scene, he's terrified, he has
          manuscript copies — I see why you'd suspect him. But you
          missed the partnership.

          Helena GAVE him those copies. Look at the research notes —
          two handwritings, working together. They were investigating
          Vector's fraud TOGETHER. They ARGUED about what to do, but
          Helena won. She wanted to protect her mentor.

          Clearmont fled because Helena told him to. 'If something
          happens, get the copies to Dumbledore.' He's not running from
          guilt. He's paralyzed between grief and duty.

          And the magic? That's ADULT-LEVEL power. Fourth-year can't
          hold a levitation spell that long, let alone aim it.

          The terrified boy didn't kill his friend. The calm professor
          killed her student."
        why_innocent: "Research partners with Helena, investigating together. She gave him manuscript copies for safekeeping. Insufficient magical power. No motive — they were allies."

      madam_pince:
        moody_response: |
          MOODY: "Pince? She's got the magical power, I'll grant you
          that. But look at the EVIDENCE.

          That enchanted clock in her office — it records every entry
          and exit. She left for dinner at 9:30. She didn't return
          until 10:22. Helena died at 10:05. Pince was eating shepherd's
          pie in the Great Hall.

          Yes, she approved Vector's archive restrictions. But she
          didn't KNOW why. Professors ask for things; librarians comply.
          She's guilty of not asking questions, not of murder.

          And her motive? What did Helena threaten in Pince? Nothing.
          The fraud was Vector's secret, not hers.

          Follow the THREAD, recruit. Who had something to LOSE?"
        why_innocent: "Enchanted clock provides alibi — was at dinner during murder. No direct connection to the fraud. Helped Vector's archive requests unknowingly."

      argus_filch:
        moody_response: |
          MOODY: "FILCH? The SQUIB?

          Look at that ceiling, recruit. Look at those scorch marks.
          That's high-power Wingardium Leviosa held for TEN SECONDS.
          Filch couldn't levitate a QUILL if you gave him a thousand
          years.

          He found the body. He cleaned the scene. He erased the log.
          All true. All AFTER THE MURDER. Vector caught him standing
          over Helena and used his Kwikspell shame to make him complicit.

          And his motive? Helena HELPED him. She kept his secret when
          she could have destroyed him. He was GRATEFUL to her.

          Filch is guilty of cowardice. He's guilty of fear. But he
          didn't kill anyone. He COULDN'T.

          Magic matters, recruit. Learn to see who can wield it."
        why_innocent: "Squib — cannot cast any magic. Helena helped him by keeping his Kwikspell secret. Blackmailed into cover-up AFTER murder, not the killer."

  # -------------------------------------------------------------------------
  # BRIEFING
  # -------------------------------------------------------------------------
  briefing:
    case_id: "case_002"

    dossier:
      title: "The Fallen Bookshelf"
      victim: "Helena Blackwood (Fourth-Year Ravenclaw, Top Arithmancy Student)"
      location: "Hogwarts Library - Restricted Section"
      time: "22:30 (Officially Discovered)"
      status: "Deceased / Crushed by Bookshelf"
      synopsis: |
        Helena Blackwood found dead beneath a fallen bookshelf. Official
        story: tragic accident, curious student, dangerous books.

        I don't believe in accidents. Not in the Restricted Section.
        Not when the victim was Professor Vector's star pupil. Not when
        three names were erased from the library log that night.

        Someone staged this, recruit. Find out who.

    teaching_question:
      prompt: "A student dies in a library known for dangerous books. What's the base rate for 'accidents' vs 'murder' in magical schools?"
      concept_summary: "Hidden Variables: When 'perfect systems' fail, look for what was wrong from the start."
      choices:
        - id: "mostly_accidents"
          text: "90% accidents — magical libraries ARE dangerous."
          response: |
            *Moody's magical eye focuses on you*

            "Reasonable. Those books bite. But here's the thing — the
            Restricted Section hasn't killed a student in forty years.
            When a 'safe' system suddenly fails, ask what CHANGED.

            Something in this case is different. Find the variable."

        - id: "mostly_murder"
          text: "70% murder — someone wanted her dead."
          response: |
            "Paranoid. I like it. But paranoia without evidence is just
            noise. Don't assume conspiracy. PROVE conspiracy.

            What evidence would distinguish accident from murder? Start
            there."

        - id: "hidden_variable"
          text: "The rate doesn't matter — something made THIS case different."
          response: |
            *Moody nods slowly*

            "CORRECT. Base rates tell you what's LIKELY. But when a
            system that's worked for decades suddenly fails, the
            interesting question isn't probability — it's causation.

            Something made Helena Blackwood's death possible. Someone
            created an opportunity. Find the hidden variable."

    rationality_concept: "hidden_variables"
    concept_description: "Systems fail when something was wrong from the start — not just bad luck."

    transition: |
      *Moody's magical eye spins, fixing on something beyond the walls*

      The Library is waiting. Watch for the clove smell — someone was
      using dark artifacts in there tonight. And check the logs. Someone
      tried very hard to hide who was in that library.

      CONSTANT VIGILANCE, recruit. Now investigate.

